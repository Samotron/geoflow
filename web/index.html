// ── Geology colour lookup ─────────────────────────────────────────────────────
const GEOL_PALETTE = [
  [/MADE\s*GROUND|FILL|HARDCORE/i,         '#A0785A', 'Made Ground / Fill'],
  [/TOPSOIL|TOP\s*SOIL/i,                  '#5C7A3E', 'Topsoil'],
  [/PEAT|ORGANIC/i,                        '#3D2B1F', 'Peat / Organic'],
  [/CLAY|COHESIVE/i,                       '#7B9EC5', 'Clay'],
  [/SILT(?!Y\s*SAND)/i,                    '#C4A87C', 'Silt'],
  [/CHALK/i,                               '#F5F0C8', 'Chalk'],
  [/SAND(?!STONE)/i,                       '#F0D870', 'Sand'],
  [/GRAVEL(?!LY)/i,                        '#C87A45', 'Gravel'],
  [/SANDY\s*GRAVEL|GRAVELLY\s*SAND/i,      '#D99055', 'Sandy Gravel / Gravelly Sand'],
  [/SILTY\s*SAND|SANDY\s*SILT/i,           '#D8C080', 'Silty Sand / Sandy Silt'],
  [/MUDSTONE|SHALE/i,                      '#7A7A90', 'Mudstone / Shale'],
  [/SANDSTONE/i,                           '#D4B483', 'Sandstone'],
  [/LIMESTONE/i,                           '#C8CEB8', 'Limestone'],
  [/GRANITE|DIORITE|IGNEOUS/i,             '#808090', 'Igneous Rock'],
  [/BASALT/i,                              '#505060', 'Basalt'],
  [/ROCK|BEDROCK/i,                        '#9090A0', 'Rock'],
];

function geolColor(desc) {
  const d = String(desc || '');
  for (const [re, col] of GEOL_PALETTE) if (re.test(d)) return col;
  // Deterministic fallback from description text
  let h = 5381;
  for (let i = 0; i < d.length; i++) h = ((h << 5) + h + d.charCodeAt(i)) >>> 0;
  const hue = h % 360;
  return `hsl(${hue},40%,70%)`;
}

function geolLabel(desc) {
  const d = String(desc || '');
  for (const [re,, lbl] of GEOL_PALETTE) if (re.test(d)) return lbl;
  return d || 'Unknown';
}

if (window.proj4) {
  window.proj4.defs('EPSG:27700',
    '+proj=tmerc +lat_0=49 +lon_0=-2 +k=0.9996012717 ' +
    '+x_0=400000 +y_0=-100000 +ellps=airy ' +
    '+towgs84=446.448,-125.157,542.06,0.15,0.247,0.842,-20.489 ' +
    '+units=m +no_defs');
}

function detectMapCrs(boreholes) {
  const pts = boreholes.filter(b => b.easting != null && b.northing != null);
  if (!pts.length) return 'unknown';
  const maxE = Math.max(...pts.map(b => Math.abs(b.easting)));
  const maxN = Math.max(...pts.map(b => Math.abs(b.northing)));
  if (maxE > 1000 && maxN > 1000) return 'bng';
  if (maxE <= 180 && maxN <= 90) return 'wgs84';
  return 'local';
}

function toLatLngForCrs(crs, easting, northing) {
  if (crs === 'bng' && window.proj4) {
    const [lng, lat] = window.proj4('EPSG:27700', 'EPSG:4326', [easting, northing]);
    return [lat, lng];
  }
  if (crs === 'wgs84') return [northing, easting];
  return [51 + northing / 111000, -1 + easting / 75000];
}

function fromLatLngForCrs(crs, lat, lng) {
  if (crs === 'bng' && window.proj4) {
    return window.proj4('EPSG:4326', 'EPSG:27700', [lng, lat]);
  }
  if (crs === 'wgs84') return [lng, lat];
  return [(lng + 1) * 75000, (lat - 51) * 111000];
}

// ── Project Map helpers ───────────────────────────────────────────────────────
function projectOntoLine(e, n, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const L2 = dx * dx + dy * dy;
  if (L2 < 1e-9) return { t: 0, dist: 0, perp: 0 };
  const t = ((e - x1) * dx + (n - y1) * dy) / L2;
  const projE = x1 + t * dx, projN = y1 + t * dy;
  const perp = Math.sqrt((e - projE) ** 2 + (n - projN) ** 2);
  return { t, dist: t * Math.sqrt(L2), perp };
}

function buildSectionBoreholes(sectionA, sectionB, locations, geolByBH, locaById, tolerance) {
  const { e: x1, n: y1 } = sectionA;
  const { e: x2, n: y2 } = sectionB;
  const L = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
  if (L < 1) return [];

  const result = [];
  for (const loc of locations) {
    if (loc.easting == null || loc.northing == null) continue;
    const { dist, perp } = projectOntoLine(loc.easting, loc.northing, x1, y1, x2, y2);
    if (perp > tolerance) continue;
    const loca = locaById[loc.id] ?? {};
    const gl = typeof loca.ground_level === 'number' ? loca.ground_level : null;
    const layers = (geolByBH[loc.id] ?? [])
      .map(r => ({
        top:  +(r.top  ?? 0),
        base: +(r.base ?? 0),
        desc: String(r.desc ?? r.geol ?? ''),
      }))
      .filter(r => Number.isFinite(r.top) && Number.isFinite(r.base) && r.base > r.top)
      .sort((a, b) => a.top - b.top);
    result.push({ ...loc, chainage: dist, perp, groundLevel: gl, layers });
  }
  return result.sort((a, b) => a.chainage - b.chainage);
}

// ── CrossSectionSvg ───────────────────────────────────────────────────────────
function CrossSectionSvg({ boreholes, sectionLength }) {
  const SVG_W = 900;
  const LM = 64, RM = 24, TM = 56, BM = 44;
  const plotW = SVG_W - LM - RM;
  const COL_W = 44;

  const maxDepth = Math.max(
    ...boreholes.flatMap(b => [b.depth ?? 0, ...b.layers.map(l => l.base)]),
    10
  );
  const hasGL = boreholes.some(b => b.groundLevel != null);
  // elevation range when GL is available
  const maxGL = hasGL ? Math.max(...boreholes.filter(b => b.groundLevel != null).map(b => b.groundLevel)) : 0;
  const minElev = hasGL
    ? Math.min(...boreholes.flatMap(b => b.groundLevel != null
        ? [b.groundLevel - (b.depth ?? maxDepth)]
        : [])) - 2
    : -maxDepth;
  const elevRange = hasGL ? maxGL - minElev + 2 : maxDepth;
  const SVG_H = Math.min(TM + (elevRange / maxDepth) * 400 + BM, 560);
  const plotH = SVG_H - TM - BM;

  const sx = ch => LM + (ch / Math.max(sectionLength, 1)) * plotW;
  const sy = hasGL
    ? elev  => TM + ((maxGL - elev) / elevRange) * plotH
    : depth => TM + (depth / maxDepth) * plotH;
  const depthToY = hasGL
    ? (bh, d) => sy((bh.groundLevel ?? maxGL) - d)
    : (_, d)  => sy(d);
  const surfaceY = bh => hasGL ? sy(bh.groundLevel ?? maxGL) : sy(0);

  // Depth/elevation axis ticks
  const yTicks = [];
  const tickStep = elevRange <= 20 ? 2 : elevRange <= 60 ? 5 : elevRange <= 150 ? 10 : 20;
  if (hasGL) {
    const start = Math.ceil(minElev / tickStep) * tickStep;
    for (let v = start; v <= maxGL + 2; v += tickStep) yTicks.push({ label: v.toFixed(0), y: sy(v) });
  } else {
    for (let d = 0; d <= maxDepth; d += tickStep) yTicks.push({ label: d.toFixed(0), y: sy(d) });
  }

  // Unique geologies for legend
  const legendItems = [];
  const seenDescs = new Set();
  for (const bh of boreholes) {
    for (const l of bh.layers) {
      const key = geolLabel(l.desc);
      if (!seenDescs.has(key)) { seenDescs.add(key); legendItems.push({ desc: l.desc, label: key }); }
    }
  }

  // Filled polygons between adjacent boreholes for each matching geology
  const fillPolys = [];
  for (let i = 0; i < boreholes.length - 1; i++) {
    const bhA = boreholes[i], bhB = boreholes[i + 1];
    const xA = sx(bhA.chainage), xB = sx(bhB.chainage);
    const uniqueDescs = new Set([...bhA.layers.map(l => l.desc), ...bhB.layers.map(l => l.desc)]);
    for (const desc of uniqueDescs) {
      const lA = bhA.layers.find(l => l.desc === desc);
      const lB = bhB.layers.find(l => l.desc === desc);
      if (!lA || !lB) continue;
      const col = geolColor(desc);
      const pts = [
        [xA + COL_W / 2, depthToY(bhA, lA.top)],
        [xB - COL_W / 2, depthToY(bhB, lB.top)],
        [xB - COL_W / 2, depthToY(bhB, lB.base)],
        [xA + COL_W / 2, depthToY(bhA, lA.base)],
      ].map(p => p.join(',')).join(' ');
      fillPolys.push({ pts, col, desc });
    }
  }

  return html`
    <div>
      <svg className="xsec-svg" width=${SVG_W} height=${SVG_H} viewBox="0 0 ${SVG_W} ${SVG_H}"
        xmlns="http://www.w3.org/2000/svg" fontFamily="system-ui,sans-serif">

        <!-- Axis lines -->
        <line x1=${LM} y1=${TM} x2=${LM} y2=${SVG_H - BM} stroke="#374151" strokeWidth="1"/>
        <line x1=${LM} y1=${SVG_H - BM} x2=${SVG_W - RM} y2=${SVG_H - BM} stroke="#374151" strokeWidth="1"/>

        <!-- Y-axis ticks and grid -->
        ${yTicks.map((t, i) => html`
          <g key=${i}>
            <line x1=${LM - 5} y1=${t.y} x2=${SVG_W - RM} y2=${t.y} stroke="#e5e7eb" strokeWidth="0.5"/>
            <line x1=${LM - 5} y1=${t.y} x2=${LM} y2=${t.y} stroke="#374151" strokeWidth="1"/>
            <text x=${LM - 8} y=${t.y + 4} fontSize="9" textAnchor="end" fill="#374151">${t.label}</text>
          </g>
        `)}
        <text x="10" y=${TM + plotH / 2} fontSize="9" textAnchor="middle" fill="#64748b"
          transform=${`rotate(-90,10,${TM + plotH / 2})`}>${hasGL ? 'Elevation (mOD)' : 'Depth (m)'}</text>

        <!-- Section A/B labels -->
        <text x=${LM} y=${TM - 8} fontSize="11" fontWeight="700" fill="var(--navy)" textAnchor="middle">A</text>
        <text x=${SVG_W - RM} y=${TM - 8} fontSize="11" fontWeight="700" fill="var(--navy)" textAnchor="middle">B</text>

        <!-- Section baseline -->
        <line x1=${LM} y1=${TM - 2} x2=${SVG_W - RM} y2=${TM - 2} stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,3"/>

        <!-- Inter-borehole fill polygons -->
        ${fillPolys.map((p, i) => html`
          <polygon key=${i} points=${p.pts} fill=${p.col} opacity="0.45" stroke="none"/>
        `)}

        <!-- Per-borehole columns -->
        ${boreholes.map((bh, bi) => {
          const cx = sx(bh.chainage);
          const surfY = surfaceY(bh);
          const botY  = depthToY(bh, bh.depth ?? maxDepth);
          return html`
            <g key=${bi}>
              <!-- Borehole trace line -->
              <line x1=${cx} y1=${surfY} x2=${cx} y2=${botY} stroke="#374151" strokeWidth="1.5"/>
              <!-- Ground surface tick -->
              <line x1=${cx - 8} y1=${surfY} x2=${cx + 8} y2=${surfY} stroke="#374151" strokeWidth="1.5"/>
              <!-- Base tick -->
              <line x1=${cx - 5} y1=${botY} x2=${cx + 5} y2=${botY} stroke="#374151" strokeWidth="1"/>

              <!-- GEOL rectangles -->
              ${bh.layers.map((l, li) => html`
                <rect key=${li}
                  x=${cx - COL_W / 2} y=${depthToY(bh, l.top)}
                  width=${COL_W} height=${Math.max(depthToY(bh, l.base) - depthToY(bh, l.top), 1)}
                  fill=${geolColor(l.desc)} stroke="#555" strokeWidth="0.5" opacity="0.9">
                  <title>${l.desc} (${l.top.toFixed(1)}–${l.base.toFixed(1)} m)</title>
                </rect>
              `)}

              <!-- Borehole ID label -->
              <text x=${cx} y=${TM - 22} fontSize="10" fontWeight="700" textAnchor="middle" fill="var(--navy)">${bh.id}</text>
              <!-- Chainage label -->
              <text x=${cx} y=${TM - 10} fontSize="9" textAnchor="middle" fill="#64748b">${bh.chainage.toFixed(0)} m</text>
              <!-- Perp distance (if > 2m) -->
              ${bh.perp > 2 ? html`
                <text x=${cx} y=${SVG_H - BM + 14} fontSize="8" textAnchor="middle" fill="#94a3b8">±${bh.perp.toFixed(0)} m</text>
              ` : null}
            </g>
          `;
        })}
      </svg>

      <!-- Chainage axis labels -->
      <svg className="xsec-svg" width=${SVG_W} height="20" viewBox="0 0 ${SVG_W} 20" xmlns="http://www.w3.org/2000/svg">
        <text x=${LM + plotW / 2} y="14" fontSize="10" textAnchor="middle" fill="#64748b">Chainage along A–B (m)</text>
      </svg>

      <!-- Legend -->
      ${legendItems.length > 0 && html`
        <div className="xsec-legend">
          <span style=${s('font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-right:4px')}>Geology:</span>
          ${legendItems.map((it, i) => html`
            <div key=${i} className="xleg-item">
              <div className="xleg-swatch" style=${{ background: geolColor(it.desc) }}></div>
              <span>${it.label}</span>
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

// ── LeafletMapPane ───────────────────────────────────────────────────────────
function LeafletMapPane({ mapData, sectionA, sectionB, onMapClick, drawing }) {
  const hostRef = useRef(null);
  const stateRef = useRef(null);
  const drawingRef = useRef(drawing);
  drawingRef.current = drawing;

  const crs = useMemo(() => detectMapCrs(mapData?.boreholes ?? []), [mapData]);

  useEffect(() => {
    if (!hostRef.current || !window.L) return;
    if (stateRef.current?.map) return;

    const boreholes = (mapData?.boreholes ?? []).filter(b => b.easting != null && b.northing != null);
    const centre = boreholes.length
      ? toLatLngForCrs(
          crs,
          boreholes.reduce((sum, b) => sum + b.easting, 0) / boreholes.length,
          boreholes.reduce((sum, b) => sum + b.northing, 0) / boreholes.length
        )
      : [51.5, -1.5];

    const map = window.L.map(hostRef.current, { zoomControl: true, preferCanvas: true }).setView(centre, 14);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(map);

    const markerLayer = window.L.layerGroup().addTo(map);
    const sectionLayer = window.L.layerGroup().addTo(map);

    for (const bh of boreholes) {
      const [lat, lng] = toLatLngForCrs(crs, bh.easting, bh.northing);
      const depth = bh.final_depth ?? 0;
      const color = depth > 30 ? '#991b1b' : depth > 20 ? '#b45309' : depth > 10 ? '#15803d' : '#1e6fb5';
      const type = String(bh.loca_type || 'BH').toUpperCase();
      const shape = type.startsWith('TP')
        ? `<rect x="3" y="3" width="14" height="14" rx="2" fill="${color}" stroke="white" stroke-width="1.5"/>`
        : type.startsWith('CP')
        ? `<polygon points="10,2 19,18 1,18" fill="${color}" stroke="white" stroke-width="1.5"/>`
        : `<circle cx="10" cy="10" r="8" fill="${color}" stroke="white" stroke-width="2"/>`;
      const icon = window.L.divIcon({
        html: `<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">${shape}</svg>`,
        className: '',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      });
      const geolRows = (mapData?.geol ?? []).filter(g => g.loca_id === bh.id).slice(0, 4);
      const popup = `
        <div class="bh-popup">
          <div class="bh-popup-id">${bh.id || 'Unknown'}</div>
          <div class="bh-popup-row"><span class="bh-popup-lbl">Type</span><span class="bh-popup-val">${bh.loca_type || 'BH'}</span></div>
          <div class="bh-popup-row"><span class="bh-popup-lbl">Ground Level</span><span class="bh-popup-val">${bh.ground_level != null ? bh.ground_level.toFixed(2) + ' mOD' : '—'}</span></div>
          <div class="bh-popup-row"><span class="bh-popup-lbl">Final Depth</span><span class="bh-popup-val">${bh.final_depth != null ? bh.final_depth.toFixed(2) + ' m' : '—'}</span></div>
          ${geolRows.map(g => `<div class="legend-row" style="margin:2px 0"><div class="legend-swatch" style="background:${geolColor(g.desc)}"></div><span style="font-size:10px">${String(g.desc || '').slice(0, 32)}</span></div>`).join('')}
        </div>`;
      window.L.marker([lat, lng], { icon }).bindPopup(popup).addTo(markerLayer);
    }

    if (boreholes.length > 1) {
      map.fitBounds(window.L.latLngBounds(boreholes.map(b => toLatLngForCrs(crs, b.easting, b.northing))), { padding: [30, 30] });
    }

    map.on('click', e => {
      if (!drawingRef.current) return;
      const [east, north] = fromLatLngForCrs(crs, e.latlng.lat, e.latlng.lng);
      onMapClick({ e: east, n: north });
    });

    stateRef.current = { map, markerLayer, sectionLayer };
    return () => map.remove();
  }, [mapData, crs, onMapClick]);

  useEffect(() => {
    const state = stateRef.current;
    if (!state) return;
    const { sectionLayer } = state;
    sectionLayer.clearLayers();

    if (sectionA) {
      const aLatLng = toLatLngForCrs(crs, sectionA.e, sectionA.n);
      window.L.circleMarker(aLatLng, { radius: 6, color: '#1a4080', fillColor: '#1a4080', fillOpacity: 1 }).addTo(sectionLayer);
      window.L.marker(aLatLng, {
        icon: window.L.divIcon({ className: '', html: '<div style="font-weight:700;color:#1a4080">A</div>' }),
      }).addTo(sectionLayer);
    }

    if (sectionB) {
      const aLatLng = toLatLngForCrs(crs, sectionA.e, sectionA.n);
      const bLatLng = toLatLngForCrs(crs, sectionB.e, sectionB.n);
      window.L.polyline([aLatLng, bLatLng], { color: '#0f2644', weight: 3, dashArray: '6 4' }).addTo(sectionLayer);
      window.L.circleMarker(bLatLng, { radius: 6, color: '#0f2644', fillColor: '#0f2644', fillOpacity: 1 }).addTo(sectionLayer);
      window.L.marker(bLatLng, {
        icon: window.L.divIcon({ className: '', html: '<div style="font-weight:700;color:#0f2644">B</div>' }),
      }).addTo(sectionLayer);
    }
  }, [sectionA, sectionB, crs]);

  return html`<div ref=${hostRef} className=${`leaflet-map-host${drawing ? ' drawing' : ''}`}></div>`;
}

// ── ThatOpenViewer ───────────────────────────────────────────────────────────
function ThatOpenViewer({ open, mapData }) {
  const containerRef = useRef(null);
  const worldRef = useRef(null);
  const [viewerState, setViewerState] = useState('Closed');

  useEffect(() => {
    if (!open || !containerRef.current || worldRef.current) return;

    let cancelled = false;

    async function initViewer() {
      try {
        setViewerState('Loading That Open viewer…');
        const [THREE, OBC] = await Promise.all([
          import('three'),
          import('https://cdn.jsdelivr.net/npm/@thatopen/components@2.4.0/dist/index.esm.js'),
        ]);
        if (cancelled) return;

        const components = new OBC.Components();
        const worlds = components.get(OBC.Worlds);
        const world = worlds.create();
        world.scene = new OBC.SimpleScene(components);
        world.camera = new OBC.SimpleCamera(components);
        world.renderer = new OBC.SimpleRenderer(components, containerRef.current);
        components.init();
        world.scene.setup();
        components.get(OBC.Grids).create(world);

        const boreholes = (mapData?.boreholes ?? []).filter(b => b.easting != null && b.northing != null && b.ground_level != null);
        if (boreholes.length) {
          const cx = boreholes.reduce((sum, b) => sum + b.easting, 0) / boreholes.length;
          const cy = boreholes.reduce((sum, b) => sum + b.northing, 0) / boreholes.length;
          const cz = boreholes.reduce((sum, b) => sum + b.ground_level, 0) / boreholes.length;
          for (const bh of boreholes) {
            const layers = (mapData?.geol ?? [])
              .filter(g => g.loca_id === bh.id)
              .sort((a, b) => (a.top ?? 0) - (b.top ?? 0));
            for (const layer of layers) {
              const top = bh.ground_level - (layer.top ?? 0);
              const base = bh.ground_level - (layer.base ?? layer.top ?? 0);
              const height = top - base;
              if (!(height > 0)) continue;
              const color = geolColor(layer.desc);
              const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(6, height, 6),
                new THREE.MeshStandardMaterial({
                  color: color.startsWith('#') ? parseInt(color.slice(1), 16) : 0x94a3b8,
                  roughness: 0.7,
                  metalness: 0.05,
                })
              );
              mesh.position.set(bh.easting - cx, (top + base) / 2 - cz, -(bh.northing - cy));
              world.scene.three.add(mesh);
            }
          }
          const spread = Math.max(
            ...boreholes.map(b => Math.max(Math.abs(b.easting - cx), Math.abs(b.northing - cy))),
            40
          );
          const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(spread * 3, spread * 3),
            new THREE.MeshStandardMaterial({ color: 0x334155, transparent: true, opacity: 0.2, side: THREE.DoubleSide })
          );
          plane.rotation.x = -Math.PI / 2;
          world.scene.three.add(plane);
          world.camera.controls.setLookAt(spread * 0.8, spread * 0.7, spread * 0.8, 0, 0, 0);
        } else {
          world.camera.controls.setLookAt(50, 40, 50, 0, 0, 0);
        }

        worldRef.current = { world, components };
        setViewerState(`That Open viewer ready${boreholes.length ? ` — ${boreholes.length} boreholes in scene` : ''}`);
      } catch (err) {
        setViewerState(`Viewer failed: ${err.message}`);
      }
    }

    initViewer();
    return () => { cancelled = true; };
  }, [open, mapData]);

  if (!open) return null;

  return html`
    <div className="three-wrap">
      <div className="three-head">
        <span>That Open 3D Viewer</span>
        <span className="meta">Leaflet map companion</span>
      </div>
      <div className="three-body">
        <div ref=${containerRef} className="three-canvas"></div>
        ${viewerState.includes('ready') ? null : html`<div className="three-empty">${viewerState}</div>`}
      </div>
      <div className="three-note">
        Borehole columns are rendered from LOCA, GEOL, and WSTK data using @thatopen/components.
      </div>
    </div>
  `;
}

// ── EnhanceTab ───────────────────────────────────────────────────────────────
function EnhanceChips({ d }) {
  const chips = [];
  if (d.material_type && d.material_type !== 'unknown') {
    chips.push(html`<span key="mat" className="enh-chip material"><span className="enh-label">material </span>${d.material_type}</span>`);
  }
  if (d.primary_soil_type) {
    chips.push(html`<span key="soil" className="enh-chip material"><span className="enh-label">soil </span>${d.primary_soil_type}</span>`);
  }
  if (d.rock_type) {
    chips.push(html`<span key="rock" className="enh-chip"><span className="enh-label">rock </span>${d.rock_type}</span>`);
  }
  if (d.consistency) {
    chips.push(html`<span key="cons" className="enh-chip consistency"><span className="enh-label">consistency </span>${d.consistency.replace(/_/g,' ')}</span>`);
  }
  if (d.density) {
    chips.push(html`<span key="dens" className="enh-chip density"><span className="enh-label">density </span>${d.density.replace(/_/g,' ')}</span>`);
  }
  if (d.moisture) {
    chips.push(html`<span key="moist" className="enh-chip"><span className="enh-label">moisture </span>${d.moisture}</span>`);
  }
  if (d.particle_size) {
    chips.push(html`<span key="ps" className="enh-chip"><span className="enh-label">particle </span>${d.particle_size.replace(/_/g,' ')}</span>`);
  }
  (d.colours||[]).forEach((c,i) => {
    chips.push(html`<span key=${'c'+i} className="enh-chip colour">${c}</span>`);
  });
  if (d.cu_min_kpa != null || d.cu_max_kpa != null) {
    const lo = d.cu_min_kpa != null ? d.cu_min_kpa : '?';
    const hi = d.cu_max_kpa != null ? d.cu_max_kpa : '∞';
    chips.push(html`<span key="cu" className="enh-chip strength"><span className="enh-label">cu </span>${lo}–${hi} kPa</span>`);
  }
  if (d.spt_n_min != null) {
    chips.push(html`<span key="spt" className="enh-chip strength"><span className="enh-label">SPT N </span>${d.spt_n_min}–${d.spt_n_max}</span>`);
  }
  if (d.is_made_ground) {
    chips.push(html`<span key="mg" className="enh-chip warn">made ground</span>`);
  }
  (d.warnings||[]).forEach((w,i) => {
    chips.push(html`<span key=${'w'+i} className="enh-chip warn">${w.replace(/_/g,' ')}</span>`);
  });
  return html`<div className="enhance-result">${chips}</div>`;
}

function EnhanceTab({ fileBytes, wasmReady }) {
  const [singleText, setSingleText] = useState('');
  const [singleResult, setSingleResult] = useState(null);
  const [batchRows, setBatchRows] = useState(null);
  const [status, setStatus] = useState('');

  function runSingle() {
    if (!singleText.trim() || !wasmReady) return;
    try {
      setSingleResult(JSON.parse(parse_description(singleText.trim())));
    } catch(e) {
      setStatus('Error: ' + e.message);
    }
  }

  function runBatch() {
    if (!fileBytes || !wasmReady) return;
    setStatus('Parsing GEOL descriptions…');
    setBatchRows(null);
    setTimeout(() => {
      try {
        const rows = JSON.parse(enhance_ags(fileBytes));
        setBatchRows(rows);
        setStatus(rows.length === 0 ? 'No GEOL_DESC rows found.' : '');
      } catch(e) {
        setStatus('Error: ' + e.message);
      }
    }, 0);
  }

  return html`
    <div>
      <div className="enhance-single">
        <h3>Parse single description</h3>
        <div className="enhance-input-row">
          <input
            type="text"
            placeholder="e.g. Firm to stiff greyish brown sandy CLAY"
            value=${singleText}
            onInput=${e => setSingleText(e.target.value)}
            onKeyDown=${e => e.key === 'Enter' && runSingle()}
          />
          <button className="btn-primary" disabled=${!singleText.trim()||!wasmReady} onClick=${runSingle}>Parse</button>
        </div>
        ${singleResult && html`
          <div style=${{ marginTop: 10 }}>
            <${EnhanceChips} d=${singleResult} />
            <div className="conf-bar-wrap">
              Confidence
              <div className="conf-bar">
                <div className="conf-bar-fill" style=${{ width: Math.round((singleResult.confidence||0)*100)+'%' }}></div>
              </div>
              ${Math.round((singleResult.confidence||0)*100)}%
            </div>
          </div>
        `}
      </div>

      <div className="enhance-table-wrap">
        <div className="enhance-table-head">
          <h2>GEOL descriptions</h2>
          <button className="btn-secondary" disabled=${!fileBytes||!wasmReady} onClick=${runBatch}
            style=${{ marginLeft: 'auto', padding: '5px 14px', fontSize: '12px' }}>
            Enhance file
          </button>
        </div>
        ${status && html`<div style=${{ padding: '10px 16px', fontSize: 13, color: 'var(--muted)' }}>${status}</div>`}
        ${!batchRows && !status && html`
          <div className="enh-no-data">Load an AGS file then click <strong>Enhance file</strong> to parse all GEOL descriptions.</div>
        `}
        ${batchRows && batchRows.length === 0 && html`
          <div className="enh-no-data">No GEOL group or no GEOL_DESC values found in this file.</div>
        `}
        ${batchRows && batchRows.length > 0 && html`
          <div style=${{ overflowX: 'auto' }}>
            <table className="enhance-tbl">
              <thead>
                <tr>
                  <th>Location</th>
                  <th>Depth (m)</th>
                  <th>Material</th>
                  <th>Consistency / Density</th>
                  <th>Colours</th>
                  <th>Strength</th>
                  <th>Conf.</th>
                  <th>Raw description</th>
                </tr>
              </thead>
              <tbody>
                ${batchRows.map((r,i) => {
                  const p = r.parsed;
                  const depth = r.geol_top != null && r.geol_base != null
                    ? `${r.geol_top}–${r.geol_base}`
                    : r.geol_top != null ? String(r.geol_top) : '—';
                  const material = p.primary_soil_type || p.rock_type || p.material_type || '—';
                  const condense = p.consistency
                    ? html`<span className="enh-tbl-chip cons">${p.consistency.replace(/_/g,' ')}</span>`
                    : p.density
                    ? html`<span className="enh-tbl-chip dens">${p.density.replace(/_/g,' ')}</span>`
                    : '—';
                  const strength = p.cu_min_kpa != null
                    ? `cu ${p.cu_min_kpa}–${p.cu_max_kpa ?? '∞'} kPa`
                    : p.spt_n_min != null
                    ? `N ${p.spt_n_min}–${p.spt_n_max}`
                    : '—';
                  return html`
                    <tr key=${i}>
                      <td><strong>${r.loca_id}</strong></td>
                      <td>${depth}</td>
                      <td>
                        ${p.rock_type
                          ? html`<span className="enh-tbl-chip rock">${p.rock_type}</span>`
                          : html`<span className="enh-tbl-chip">${material}</span>`}
                      </td>
                      <td>${condense}</td>
                      <td>${(p.colours||[]).join(', ') || '—'}</td>
                      <td>${strength}</td>
                      <td>
                        <div className="conf-bar" style=${{ maxWidth: 60 }}>
                          <div className="conf-bar-fill" style=${{ width: Math.round((p.confidence||0)*100)+'%' }}></div>
                        </div>
                        ${Math.round((p.confidence||0)*100)}%
                      </td>
                      <td className="raw-desc" title=${r.geol_desc}>${r.geol_desc}</td>
                    </tr>
                  `;
                })}
              </tbody>
            </table>
          </div>
        `}
      </div>
    </div>
  `;
}

// ── MapTab ────────────────────────────────────────────────────────────────────
function MapTab({ locations, mapData, fileBytes, wasmReady, fileInfo }) {
  const [sectionA, setSectionA] = useState(null);
  const [sectionB, setSectionB] = useState(null);
  const [drawStep, setDrawStep] = useState(0); // 0=idle, 1=place-A, 2=place-B
  const [tolerance, setTolerance] = useState(200);
  const [show3d, setShow3d] = useState(false);

  const geolByBH = useMemo(() => {
    const m = {};
    for (const r of (mapData?.geol ?? [])) {
      const id = r.loca_id;
      if (!id) continue;
      if (!m[id]) m[id] = [];
      m[id].push(r);
    }
    return m;
  }, [mapData]);

  const locaById = useMemo(() => {
    const m = {};
    for (const r of (mapData?.boreholes ?? [])) { if (r.id) m[r.id] = r; }
    return m;
  }, [mapData]);

  const sectionBoreholes = useMemo(() => {
    if (!sectionA || !sectionB) return [];
    return buildSectionBoreholes(sectionA, sectionB, locations, geolByBH, locaById, tolerance);
  }, [sectionA, sectionB, locations, geolByBH, locaById, tolerance]);

  const sectionLength = sectionA && sectionB
    ? Math.sqrt((sectionB.e - sectionA.e) ** 2 + (sectionB.n - sectionA.n) ** 2)
    : 0;

  const excluded = sectionA && sectionB
    ? locations.filter(l => l.easting != null && l.northing != null &&
        !sectionBoreholes.find(b => b.id === l.id))
    : [];

  function handleDraw() {
    setSectionA(null); setSectionB(null);
    setDrawStep(1);
  }
  function handleClear() {
    setSectionA(null); setSectionB(null); setDrawStep(0);
  }
  function handleMapClick(pt) {
    if (drawStep === 1) { setSectionA(pt); setDrawStep(2); }
    else if (drawStep === 2) { setSectionB(pt); setDrawStep(0); }
  }

  const hintText = drawStep === 1 ? 'Click on the map to place point A'
                 : drawStep === 2 ? 'Click on the map to place point B'
                 : null;

  if (locations.length === 0) return html`
    <div className="empty">
      <p>Load an AGS file with borehole locations (LOCA group) in <strong>Upload &amp; Convert</strong>.</p>
    </div>
  `;

  return html`
    <div>
      <!-- Toolbar -->
      <div className="map-toolbar">
        <button className="btn-primary" onClick=${handleDraw} disabled=${drawStep > 0}>
          ${drawStep === 0 ? 'Draw Section Line' : 'Drawing…'}
        </button>
        ${(sectionA || sectionB) && html`
          <button className="btn-secondary" onClick=${handleClear}>Clear Section</button>
        `}
        ${hintText && html`<span className="draw-mode-hint">${hintText}</span>`}
        <button className="btn-secondary" onClick=${() => setShow3d(v => !v)}>
          ${show3d ? 'Hide 3D View' : 'Show 3D View'}
        </button>
        <label style=${s('margin-left:auto')}>
          Tolerance
          <input type="range" min="10" max="2000" step="10" value=${tolerance}
            onChange=${e => setTolerance(+e.target.value)} />
          <strong>${tolerance} m</strong>
        </label>
      </div>

      <!-- Map -->
      <div className="proj-map-wrap">
        <div className="proj-map-head">
          Project Map — ${locations.length} borehole${locations.length !== 1 ? 's' : ''}
          ${sectionA && sectionB ? html`
            &nbsp;·&nbsp; Section A–B: ${sectionLength.toFixed(0)} m
            &nbsp;·&nbsp; ${sectionBoreholes.length} borehole${sectionBoreholes.length !== 1 ? 's' : ''} on section
          ` : null}
        </div>
        <${LeafletMapPane}
          mapData=${mapData}
          sectionA=${sectionA}
          sectionB=${sectionB}
          onMapClick=${handleMapClick}
          drawing=${drawStep > 0}
        />
        <div className="map-meta-row">
          <span><strong>Map stack:</strong> Leaflet + OpenStreetMap</span>
          <span><strong>Data:</strong> ${mapData?.boreholes?.length ?? 0} boreholes, ${mapData?.geol?.length ?? 0} geology rows</span>
          <div className="map-legend-inline">
            <span className="map-legend-item"><span className="map-swatch circle" style=${{ background: '#1e6fb5' }}></span>Borehole</span>
            <span className="map-legend-item"><span className="map-swatch" style=${{ background: '#0f766e' }}></span>Trial pit</span>
            <span className="map-legend-item"><span className="map-swatch" style=${{ background: '#6d28d9' }}></span>CPT / other</span>
          </div>
        </div>
      </div>

      <${ThatOpenViewer} open=${show3d} mapData=${mapData} />

      <!-- Cross Section -->
      ${sectionA && sectionB && html`
        <div className="xsec-wrap">
          <div className="xsec-head">
            Cross Section A–B
            <span className="xsec-meta">
              ${sectionLength.toFixed(0)} m · ${sectionBoreholes.length} boreholes
              ${(mapData?.geol?.length ?? 0) === 0 ? ' · No GEOL data in file' : ''}
            </span>
          </div>
          ${sectionBoreholes.length === 0 ? html`
            <div className="empty" style=${s('padding:32px')}>
              <p>No boreholes within ${tolerance} m of the section line.</p>
              <p>Try increasing the tolerance or redrawing the section.</p>
            </div>
          ` : html`
            <div className="xsec-body">
              <${CrossSectionSvg}
                boreholes=${sectionBoreholes}
                sectionLength=${sectionLength}
              />
            </div>
            ${excluded.length > 0 && html`
              <div className="bh-excl-note">
                ${excluded.length} borehole${excluded.length !== 1 ? 's' : ''} excluded (beyond ${tolerance} m tolerance):
                ${excluded.map(b => b.id).join(', ')}
              </div>
            `}
          `}
        </div>
      `}
    </div>
  `;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [wasmReady, setWasmReady]         = useState(false);
  const [fileBytes, setFileBytes]         = useState(null);
  const [fileName, setFileName]           = useState('');
  const [fileSize, setFileSize]           = useState(0);
  const [fileInfo, setFileInfo]           = useState(null);
  const [diagnostics, setDiagnostics]     = useState(null);
  const [locations, setLocations]         = useState([]);
  const [mapData, setMapData]             = useState(null);
  const [allGroupData, setAllGroupData]   = useState(null);
  const [allGroupsMeta, setAllGroupsMeta] = useState(null);
  const [status, setStatus]               = useState({ msg: 'Loading WebAssembly engine…', type: 'loading' });
  const [tab, setTab]                     = useState('upload');

  const applyLoadedBytes = useCallback((bytes, meta = {}) => {
    setFileBytes(bytes);
    setFileName(meta.fileName ?? '');
    setFileSize(meta.fileSize ?? bytes.length ?? 0);
    setDiagnostics(null);
    try {
      const info = JSON.parse(ags_info(bytes));
      setFileInfo(info);
    } catch(_) {}
    try {
      const data = JSON.parse(get_map_data(bytes));
      setMapData(data);
      setLocations((data?.boreholes ?? [])
        .filter(b => b.id)
        .map(b => ({ id: b.id, depth: b.final_depth, easting: b.easting, northing: b.northing })));
    } catch(_) {}
    try {
      setAllGroupData(JSON.parse(get_all_groups_data(bytes)));
    } catch(_) {}
    try {
      setAllGroupsMeta(JSON.parse(get_all_groups_meta(bytes)));
    } catch(_) {}
  }, []);

  useEffect(() => {
    init()
      .then(() => { setWasmReady(true); setStatus({ msg: 'Engine ready. Drop or select an AGS file.', type: '' }); })
      .catch(e  => { setStatus({ msg: 'Failed to load WebAssembly engine: ' + e.message, type: 'error' }); });
  }, []);

  // When running under `geoflow explore --serve`, auto-load the server's file.
  // The WASM shim ignores bytes and proxies calls to the local JSON API.
  useEffect(() => {
    if (!wasmReady || !window.__GEOFLOW_CLI__) return;
    const cli = window.__GEOFLOW_CLI__;
    const bytes = new Uint8Array(0);
    applyLoadedBytes(bytes, { fileName: cli.file, fileSize: 0 });
    setStatus({ msg: `Loaded from CLI: ${cli.file}`, type: '' });
    setTab('data');
  }, [wasmReady, applyLoadedBytes]);

  useEffect(() => {
    if (!wasmReady || window.__GEOFLOW_CLI__ || !window.__GEOFLOW_BOOT__?.sourceUrl) return;
    const boot = window.__GEOFLOW_BOOT__;
    fetch(boot.sourceUrl)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.arrayBuffer();
      })
      .then(buf => {
        const bytes = new Uint8Array(buf);
        applyLoadedBytes(bytes, {
          fileName: boot.file ?? boot.sourceUrl.split('/').pop() ?? 'file.ags',
          fileSize: bytes.length,
        });
        setStatus({ msg: `Loaded exported file: ${boot.file ?? 'file.ags'}`, type: '' });
        setTab('data');
      })
      .catch(e => {
        setStatus({ msg: 'Failed to load exported file: ' + e.message, type: 'error' });
      });
  }, [wasmReady, applyLoadedBytes]);

  const handleFile = useCallback(file => {
    setDiagnostics(null);
    setLocations([]);
    setMapData(null);
    setFileInfo(null);
    const r = new FileReader();
    r.onload = e => {
      const bytes = new Uint8Array(e.target.result);
      if (wasmReady) {
        applyLoadedBytes(bytes, { fileName: file.name, fileSize: file.size });
      }
      setStatus({ msg: 'File loaded. Click Validate to check for issues.', type: '' });
    };
    r.readAsArrayBuffer(file);
  }, [wasmReady, applyLoadedBytes]);

  const handleValidate = useCallback(() => {
    if (!fileBytes || !wasmReady) return;
    setStatus({ msg: 'Validating…', type: 'loading' });
    setTimeout(() => {
      try {
        setDiagnostics(JSON.parse(validate_ags(fileBytes)));
        setStatus({ msg: '', type: '' });
      } catch(e) { setStatus({ msg: 'Validation error: ' + e.message, type: 'error' }); }
    }, 0);
  }, [fileBytes, wasmReady]);

  const handleFix = useCallback(() => {
    if (!fileBytes || !wasmReady) return;
    setStatus({ msg: 'Applying fixes…', type: 'loading' });
    setTimeout(() => {
      try {
        downloadBlob(new Blob([fix_ags(fileBytes)], { type: 'text/plain' }), fixedName(fileName));
        setStatus({ msg: 'Fixed file downloaded.', type: '' });
      } catch(e) { setStatus({ msg: 'Fix error: ' + e.message, type: 'error' }); }
    }, 0);
  }, [fileBytes, wasmReady, fileName]);

  const handleConvert = useCallback(() => {
    if (!fileBytes || !wasmReady) return;
    setStatus({ msg: 'Converting to DIGGS…', type: 'loading' });
    setTimeout(() => {
      try {
        const xml = convert_to_diggs(fileBytes);
        if (!xml) { setStatus({ msg: 'Conversion produced no output (unmapped groups?)', type: 'error' }); return; }
        downloadBlob(new Blob([xml], { type: 'application/xml' }), digsName(fileName));
        setStatus({ msg: 'DIGGS file downloaded.', type: '' });
      } catch(e) { setStatus({ msg: 'Conversion error: ' + e.message, type: 'error' }); }
    }, 0);
  }, [fileBytes, wasmReady, fileName]);

  const TABS = [
    { id: 'upload',     label: 'Upload & Convert' },
    { id: 'data',       label: 'Data'             },
    { id: 'validation', label: 'Validation'       },
    { id: 'map',        label: 'Map'              },
    { id: 'logs',       label: 'Logs'             },
    { id: 'diff',       label: 'Diff'             },
    { id: 'enhance',    label: 'Enhance'          },
    { id: 'rules',      label: 'Rules'            },
  ];

  return html`
    <div>
      <header>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <h1>GeoFlow</h1>
        <span className="hdr-sub">${window.__GEOFLOW_CLI__
          ? `CLI Explorer — ${window.__GEOFLOW_CLI__.file}`
          : window.__GEOFLOW_BOOT__?.file
          ? `Explorer — ${window.__GEOFLOW_BOOT__.file}`
          : 'AGS 4.x Validator & Converter — runs entirely in your browser'}</span>
      </header>

      <main>
        <div className="tab-bar">
          ${TABS.map(t => html`
            <button key=${t.id} className=${`tab-btn${tab===t.id?' active':''}`} onClick=${()=>setTab(t.id)}>
              ${t.label}
            </button>
          `)}
        </div>

        ${tab === 'upload' && html`
          <${UploadTab}
            fileBytes=${fileBytes} fileName=${fileName} fileSize=${fileSize}
            wasmReady=${wasmReady} status=${status} fileInfo=${fileInfo}
            diagnostics=${diagnostics}
            onFile=${handleFile} onValidate=${handleValidate}
            onFix=${handleFix} onConvert=${handleConvert}
          />
        `}
        ${tab === 'data' && html`
          <${DataTab}
            allGroupData=${allGroupData}
            allGroupsMeta=${allGroupsMeta}
            fileInfo=${fileInfo}
          />
        `}
        ${tab === 'validation' && html`
          <${ValidationMapTab}
            diagnostics=${diagnostics} locations=${locations}
            fileBytes=${fileBytes} wasmReady=${wasmReady}
            onValidate=${handleValidate}
          />
        `}
        ${tab === 'map' && html`
          <${MapTab}
            locations=${locations} fileBytes=${fileBytes}
            wasmReady=${wasmReady} fileInfo=${fileInfo} mapData=${mapData}
          />
        `}
        ${tab === 'logs' && html`
          <${LogTab}
            locations=${locations} fileBytes=${fileBytes}
            wasmReady=${wasmReady} fileInfo=${fileInfo}
          />
        `}
        ${tab === 'diff' && html`<${DiffTab} wasmReady=${wasmReady} />`}
        ${tab === 'enhance' && html`
          <${EnhanceTab} fileBytes=${fileBytes} wasmReady=${wasmReady} />
        `}
        ${tab === 'rules' && html`
          <${RulesTab} fileBytes=${fileBytes} wasmReady=${wasmReady} />
        `}
      </main>
    </div>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
