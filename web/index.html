<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoFlow — AGS Validator & Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0f2644;
      --blue:   #1a4080;
      --amber:  #d97706;
      --red:    #dc2626;
      --orange: #ea580c;
      --green:  #16a34a;
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --border: #cbd5e1;
      --text:   #0f172a;
      --muted:  #64748b;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--navy);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header .hdr-sub { font-size: 12px; opacity: 0.55; margin-left: auto; }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .12s, border-color .12s;
    }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--blue);
      background: #eff6ff;
    }
    .drop-zone svg { width: 40px; height: 40px; color: var(--muted); margin-bottom: 12px; }
    .drop-zone p { color: var(--muted); line-height: 1.6; }
    .drop-zone strong { color: var(--text); }
    .file-name { margin-top: 10px; font-weight: 600; color: var(--blue); font-size: 13px; }

    /* ── Buttons ── */
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    button {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: var(--navy); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--blue); }
    .btn-secondary { background: #e2e8f0; color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #cbd5e1; }
    .btn-accent    { background: var(--amber); color: #fff; }
    .btn-accent:hover:not(:disabled)    { background: #b45309; }

    /* ── Status ── */
    .status { margin-top: 14px; font-size: 13px; color: var(--muted); min-height: 20px; }
    .status.loading { color: var(--blue); }
    .status.error   { color: var(--red);  }

    /* ── Summary badges ── */
    .summary { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-error   { background: #fef2f2; color: var(--red);    border: 1px solid #fecaca; }
    .badge-warning { background: #fff7ed; color: var(--orange);  border: 1px solid #fed7aa; }
    .badge-info    { background: #eff6ff; color: #2563eb;        border: 1px solid #bfdbfe; }
    .badge-ok      { background: #f0fdf4; color: var(--green);   border: 1px solid #bbf7d0; }

    /* ── File info bar ── */
    .file-info-bar {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .file-info-bar span strong { color: var(--text); }

    /* ── Two-column layout for validation/map tab ── */
    .val-map-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .val-map-grid { grid-template-columns: 1fr; }
    }

    /* ── Diagnostics log list ── */
    .diag-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .diag-panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .diag-panel-head h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
    .filter-pills { display: flex; gap: 6px; margin-left: auto; }
    .pill {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .pill.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .diag-scroll { max-height: 560px; overflow-y: auto; }
    .log-row {
      display: grid;
      grid-template-columns: 44px 72px 120px 1fr;
      align-items: baseline;
      gap: 0 10px;
      padding: 7px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .log-row:last-child { border-bottom: none; }
    .log-row:hover { background: #f8fafc; }
    .log-sev {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-top: 1px;
    }
    .sev-error   { color: var(--red); }
    .sev-warning { color: var(--orange); }
    .sev-info    { color: #2563eb; }
    .log-rule  { color: var(--muted); font-size: 11px; }
    .log-loc   { color: var(--muted); font-size: 11px; }
    .log-msg   { color: var(--text); word-break: break-word; }

    /* ── Borehole map card ── */
    .map-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .map-card-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
    .map-card-body { padding: 16px; }
    .map-svg-wrap { border: 1px solid var(--border); border-radius: 4px; background: #f8fafc; overflow: hidden; }
    .bh-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .bh-btn {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: all .12s;
    }
    .bh-btn:hover  { border-color: var(--blue); color: var(--blue); }
    .bh-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── Borehole preview (map tab) ── */
    .bh-preview {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      overflow-x: auto;
    }
    .bh-preview-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .bh-preview-meta strong { color: var(--text); margin-right: 16px; }

    /* ── Log tab layout ── */
    .log-tab-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 640px) {
      .log-tab-grid { grid-template-columns: 1fr; }
    }
    .bh-list-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: sticky;
      top: 16px;
    }
    .bh-list-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
    .bh-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: background .1s;
    }
    .bh-list-item:last-child { border-bottom: none; }
    .bh-list-item:hover { background: #f1f5f9; }
    .bh-list-item.active { background: var(--navy); color: #fff; }
    .bh-list-item .depth { font-size: 11px; opacity: 0.6; }

    /* ── Log sheet (formal borehole log) ── */
    .log-sheet {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .log-sheet-hdr {
      background: var(--navy);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .log-sheet-hdr h2 { font-size: 15px; font-weight: 700; }
    .log-sheet-hdr .version { margin-left: auto; font-size: 11px; opacity: 0.5; }
    .log-sheet-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 2px solid var(--navy);
    }
    .meta-cell {
      padding: 9px 16px;
      border-right: 1px solid var(--border);
      font-size: 12px;
    }
    .meta-cell:last-child { border-right: none; }
    .meta-cell .lbl {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .meta-cell .val {
      font-weight: 600;
      font-family: monospace;
      font-size: 13px;
      color: var(--text);
    }
    .log-sheet-col-hdr {
      display: flex;
      background: #f0f4f8;
      border-bottom: 1px solid var(--border);
      padding: 5px 20px;
    }
    .log-col-lbl {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: center;
    }
    .log-sheet-body {
      padding: 0 20px 8px;
      overflow-x: auto;
    }
    .log-sheet-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: #f8fafc;
      font-size: 11px;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 14px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Diff tab ── */
    .diff-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .diff-zone-lbl { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .diff-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: 13px;
      color: var(--muted);
    }
    .diff-drop:hover, .diff-drop.drag-over { border-color: var(--blue); background: #eff6ff; }
    .diff-drop.loaded { border-color: var(--green); background: #f0fdf4; color: var(--text); }
    .diff-result { margin-top: 20px; }
    .diff-identical { padding: 24px; text-align: center; color: var(--green); font-weight: 600; }
    .diff-group-row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .diff-group-hdr {
      padding: 10px 16px;
      font-family: monospace;
      font-weight: 700;
      font-size: 13px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .diff-badge { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .diff-added     { background: #dcfce7; color: #15803d; }
    .diff-removed   { background: #fee2e2; color: #b91c1c; }
    .diff-modified  { background: #fef9c3; color: #a16207; }
    .diff-unchanged { background: #f1f5f9; color: var(--muted); }
    .diff-only { font-family: monospace; color: var(--muted); padding: 4px 0; display: block; }
    .diff-toolbar { display: flex; justify-content: flex-end; margin: 0 0 12px; }
    .diff-expander {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
    }
    .diff-section { padding: 12px 16px; border-top: 1px solid var(--border); }
    .diff-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .diff-group-summary { display: flex; flex-wrap: wrap; gap: 8px; margin-left: auto; }
    .diff-group-body { padding: 0; }
    .diff-row-list { display: grid; gap: 8px; }
    .diff-row-card { border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; background: #fcfdff; }
    .diff-row-key { font-family: monospace; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .diff-field-list { display: grid; gap: 6px; }
    .diff-field-change { font-size: 12px; line-height: 1.45; }
    .diff-field-change code { font-size: 12px; }
    .diff-field-before { color: #b91c1c; }
    .diff-field-after { color: #15803d; }
    .diff-preview { display: grid; gap: 4px; margin: 0; }
    .diff-preview-line { font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; color: var(--muted); }
    .diff-unified {
      margin: 0;
      padding: 12px 14px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      overflow-x: auto;
    }
    .diff-line-file { color: #93c5fd; }
    .diff-line-hunk { color: #fcd34d; }
    .diff-line-add { color: #86efac; background: rgba(34, 197, 94, 0.12); display: block; margin: 0 -14px; padding: 0 14px; }
    .diff-line-remove { color: #fca5a5; background: rgba(239, 68, 68, 0.14); display: block; margin: 0 -14px; padding: 0 14px; }
    .diff-line-context { color: #cbd5e1; display: block; }
    .diff-full-toggle { margin-bottom: 12px; }
    .diff-details { border-top: 1px solid var(--border); }
    .diff-details > summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 16px;
      font-family: monospace;
      font-size: 13px;
      font-weight: 700;
      background: #f8fafc;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .diff-details > summary::-webkit-details-marker { display: none; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }
    .empty svg { margin: 0 auto 14px; display: block; }
    .empty p { line-height: 1.6; }
    .empty strong { color: var(--text); }

    /* ── Data tab ── */
    .data-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 640px) { .data-layout { grid-template-columns: 1fr; } }

    .grp-list-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
    }
    .grp-list-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .grp-list-scroll { overflow-y: auto; flex: 1; }
    .grp-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: background .1s;
    }
    .grp-list-item:last-child { border-bottom: none; }
    .grp-list-item:hover { background: #f1f5f9; }
    .grp-list-item.active { background: var(--navy); color: #fff; }
    .grp-list-item.active .grp-count { opacity: 0.6; }
    .grp-count {
      font-size: 11px;
      color: var(--muted);
      background: #e2e8f0;
      padding: 1px 6px;
      border-radius: 99px;
      font-family: system-ui, sans-serif;
    }

    .data-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-width: 0;
    }
    .data-panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
    }
    .data-panel-head h2 {
      font-size: 13px;
      font-weight: 700;
      font-family: monospace;
    }
    .data-search {
      margin-left: auto;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      width: 180px;
      transition: border-color .15s;
    }
    .data-search:focus { border-color: var(--blue); }

    .data-tbl-wrap {
      overflow: auto;
      max-height: calc(100vh - 200px);
    }
    .data-tbl {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .data-tbl thead { position: sticky; top: 0; z-index: 2; }
    .data-tbl th {
      background: #f8fafc;
      padding: 7px 12px;
      text-align: left;
      font-weight: 700;
      font-family: monospace;
      font-size: 11px;
      color: var(--text);
      border-bottom: 2px solid var(--border);
      border-right: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    .data-tbl th .th-unit {
      display: block;
      font-weight: 400;
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }
    .data-tbl th:first-child { color: var(--muted); font-weight: 400; }
    .data-tbl td {
      padding: 6px 12px;
      border-bottom: 1px solid #f1f5f9;
      border-right: 1px solid #f8fafc;
      vertical-align: middle;
      white-space: nowrap;
      font-family: monospace;
      font-size: 12px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .data-tbl td.num { text-align: right; color: #334155; }
    .data-tbl td.null { color: #cbd5e1; }
    .data-tbl td:first-child { color: var(--muted); text-align: right; font-size: 10px; background: #fafafa; }
    .data-tbl tr:hover td { background: #f8faff; }
    .data-tbl tr:hover td:first-child { background: #f1f5f9; }

    /* Clickable key chips */
    .key-chip {
      display: inline-block;
      padding: 2px 9px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 99px;
      font-family: monospace;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .key-chip:hover { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

    .tbl-more {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Ontology view */
    .onto-back-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
    }
    .onto-back-btn {
      padding: 5px 12px;
      background: #e2e8f0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s;
    }
    .onto-back-btn:hover { background: #cbd5e1; }
    .onto-title {
      font-size: 13px;
      font-weight: 700;

function formatBytes(n) {
  if (n < 1024)      return n + ' B';
  if (n < 1048576)   return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(1) + ' MB';
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: name });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function fixedName(n) { const d = n.lastIndexOf('.'); return d > 0 ? n.slice(0,d)+'_fixed'+n.slice(d) : n+'_fixed'; }
function digsName(n)  { const d = n.lastIndexOf('.'); return (d > 0 ? n.slice(0,d) : n) + '.diggs.xml'; }

// Convert a CSS shorthand string to a React-compatible style object (camelCase keys).
function s(str) {
  const obj = {};
  for (const decl of str.split(';')) {
    const i = decl.indexOf(':');
    if (i < 0) continue;
    const k = decl.slice(0, i).trim().replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    const v = decl.slice(i + 1).trim();
    if (k && v) obj[k] = v;
  }
  return obj;
}

const RULES_STARTER = `version: 1
name: my-rules

codelists:

rules:

function registerRulesCompletions(m) {
  const K = m.languages.CompletionItemKind;
  const R = m.languages.CompletionItemInsertTextRule.InsertAsSnippet;

    triggerCharacters: [' ', ':', '-'],
    provideCompletionItems(model, position) {

      const range  = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber, startColumn: word.startColumn, endColumn: position.column };

        snip('info',    'info',    K.EnumMember, 'Informational note'),

        snip("group == 'GROUP'",      "group == '${1:LOCA}'",                                   K.Snippet,  'Filter by group name'),
        snip('row.FIELD != null',     'row.${1:FIELD} != null',                                  K.Snippet,  'Null check'),
        snip('exists_in',             "exists_in('${1:LOCA}', '${2:LOCA_ID}', row.${3:LOCA_ID})", K.Function, 'Cross-group reference check'),
        snip('codelist membership',   "row.${1:FIELD} in codelist('${2:list_name}')",             K.Snippet,  'Codelist membership check'),
        snip('is_monotonic',          'is_monotonic(rows.map(r, r.${1:FIELD}))',                  K.Function, 'Monotonically increasing sequence'),
        snip('codelist()',            "codelist('${1:list_name}')",                               K.Function, 'Get named codelist as a list'),
      ]};

      // Rule properties at 4-space indent (inside a list item)
      if (indent === 4) return { suggestions: [
        snip('id',          'id: ${1:GROUP-001}',                    K.Property, 'Unique rule ID (e.g. LOCA-001)'),
        snip('description', 'description: "${1:Description}"',       K.Property, 'Human-readable description'),
        snip('severity',    'severity: ${1|error,warning,info|}',    K.Property, 'error | warning | info'),
        snip('when',        "when: \"group == '${1:LOCA}'\"",        K.Property, 'CEL filter — rule skipped if false'),
        snip('expr',        'expr: "${1:true}"',                     K.Property, 'CEL expression — false triggers a violation'),
        snip('message',     'message: "${1:Message {row.FIELD}}"',   K.Property, 'Diagnostic message template'),
        snip('scope',       'scope: "group:${1:LOCA_ID}"',           K.Property, 'Grouping key for aggregate rules'),
      ]};

      // New list item under rules (indent 2, starts with -)
      if (indent === 2 && trim.startsWith('-')) return { suggestions: [
        snip('- new rule', `- id: \${1:GROUP-001}\n    description: "\${2:Description}"\n    severity: \${3|error,warning,info|}\n    when: "group == '\${4:LOCA}'"\n    expr: "\${5:true}"\n    message: "\${6:Message}"`, K.Snippet, 'Insert a complete rule skeleton'),
      ]};

      // Top-level keys
      if (indent === 0 && !trim.startsWith('-')) return { suggestions: [
        snip('version',      'version: 1',                                                             K.Property, 'Schema version (must be 1)'),
        snip('name',         'name: ${1:my-rules}',                                                    K.Property, 'Rule pack name'),
        snip('pack_version', 'pack_version: "${1:0.1}"',                                               K.Property, 'Pack version string'),
        snip('codelists',    'codelists:\n  ${1:list_name}:\n    inline: ["${2:value1}", "${3:value2}"]', K.Property, 'Named codelists for use in rules'),
        snip('rules',        'rules:',                                                                 K.Property, 'List of validation rules'),
      ]};

      return { suggestions: [] };
    }
  });
}

// ── DiagnosticsLog ────────────────────────────────────────────────────────────
function DiagnosticsLog({ diagnostics }) {
  const [filter, setFilter] = useState('all');
  const counts = useMemo(() => {
    const c = { error: 0, warning: 0, info: 0 };
    diagnostics.forEach(d => { if (d.severity in c) c[d.severity]++; });
    return c;
  }, [diagnostics]);
  const visible = useMemo(
    () => filter === 'all' ? diagnostics : diagnostics.filter(d => d.severity === filter),
    [diagnostics, filter]
  );

  if (diagnostics.length === 0) return html`
    <div className="diag-panel">
      <div className="diag-panel-head"><h2>Diagnostics</h2></div>
      <div className="empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2">
          <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
        <p>No issues found — file is valid.</p>
      </div>
    </div>
  `;

  const LABELS = { all: `ALL (${diagnostics.length})`, error: `ERR (${counts.error})`, warning: `WARN (${counts.warning})`, info: `INFO (${counts.info})` };
  return html`
    <div className="diag-panel">
      <div className="diag-panel-head">
        <h2>Diagnostics</h2>
        <div className="filter-pills">
          ${['all','error','warning','info'].map(f => html`
            <button key=${f} className=${`pill${filter===f?' active':''}`} onClick=${()=>setFilter(f)}>${LABELS[f]}</button>
          `)}
        </div>
      </div>
      <div className="diag-scroll">
        ${visible.map((d, i) => {
          const group = d.location?.group ?? '—';
          const line  = d.location?.line  != null ? `L${d.location.line}` : '—';
          const sev   = d.severity === 'error' ? 'ERR' : d.severity === 'warning' ? 'WARN' : 'INFO';
          return html`
            <div key=${i} className="log-row">
              <span className=${`log-sev sev-${d.severity}`}>${sev}</span>
              <span className="log-rule">${d.rule_id}</span>
              <span className="log-loc">${group} · ${line}</span>
              <span className="log-msg">${d.message}</span>
            </div>
          `;
        })}
      </div>
    </div>
  `;
}

// ── RulesTab ──────────────────────────────────────────────────────────────────
function RulesTab({ fileBytes, wasmReady }) {
  const containerRef = useRef(null);
  const editorRef    = useRef(null);
  const [editorReady, setEditorReady] = useState(false);
  const [packError,   setPackError]   = useState(null);
  const [diagnostics, setDiagnostics] = useState(null);
  const [validating,  setValidating]  = useState(false);

  useEffect(() => {
    if (!containerRef.current) return;
    let alive = true;

    function initEditor(m) {
      if (!alive || !containerRef.current) return;
      if (!m._geoflowCompletions) {
        m._geoflowCompletions = true;
        registerRulesCompletions(m);
      }
      editorRef.current = m.editor.create(containerRef.current, {
        value: _rulesEditorContent,
        language: 'yaml',
        theme: 'vs',
        fontSize: 13,
        fontFamily: "'Menlo','Consolas','Monaco',monospace",
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        lineNumbers: 'on',
        automaticLayout: true,
        wordWrap: 'on',
        tabSize: 2,
        insertSpaces: true,
        quickSuggestions: { other: true, comments: false, strings: true },
      });
      editorRef.current.onDidChangeModelContent(() => {
        _rulesEditorContent = editorRef.current.getValue();
      });
      setEditorReady(true);
    }

    if (window.monaco) {
      initEditor(window.monaco);
    } else {
      window.require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
      window.require(['vs/editor/editor.main'], () => initEditor(window.monaco));
    }

    return () => {
      alive = false;
      if (editorRef.current) {
        _rulesEditorContent = editorRef.current.getValue();
        editorRef.current.dispose();
        editorRef.current = null;
        setEditorReady(false);
      }
    };
  }, []);

  const handleValidate = useCallback(() => {
    if (!fileBytes || !wasmReady || !editorRef.current) return;
    const yaml = editorRef.current.getValue();
    setValidating(true);
    setPackError(null);
    setTimeout(() => {
      try {
        const data = JSON.parse(validate_ags_with_rules(fileBytes, yaml));
        if (Array.isArray(data)) {
          setDiagnostics(data);
          setPackError(null);
        } else {
          setPackError(data.error ?? 'Unknown error');
          setDiagnostics(null);
        }
      } catch(e) { setPackError(e.message); }
      setValidating(false);
    }, 0);
  }, [fileBytes, wasmReady]);

  const handleDownload = useCallback(() => {
    if (!editorRef.current) return;
    downloadBlob(new Blob([editorRef.current.getValue()], { type: 'text/yaml' }), 'rules.yml');
  }, []);

  return html`
    <div className="rules-layout">
      <div>
        <div className="rules-editor-card">
          <div className="rules-editor-head">
            <span>Rule Pack Editor</span>
            <span className="rules-editor-hint">YAML · CEL expressions</span>
          </div>
          <div className="rules-editor-body">
            <div ref=${containerRef} className="rules-editor-wrap" />
            ${!editorReady && html`<div className="rules-editor-loading">Loading editor…</div>`}
          </div>
          <div className="rules-editor-footer">
            <button className="btn-primary"
              disabled=${!fileBytes || !wasmReady || !editorReady || validating}
              onClick=${handleValidate}>
              ${validating ? 'Validating…' : 'Validate with Pack'}
            </button>
            <button className="btn-secondary" disabled=${!editorReady} onClick=${handleDownload}>
              Download .yml
            </button>
          </div>
          ${packError && html`<div className="rules-pack-error"><strong>Pack error:</strong> ${packError}</div>`}
        </div>
      </div>
      <div>
        ${!fileBytes ? html`
          <div className="empty">
            <p>Load an AGS file in <strong>Upload &amp; Convert</strong> to validate against this pack.</p>
          </div>
        ` : diagnostics ? html`
          <${DiagnosticsLog} diagnostics=${diagnostics} />
        ` : html`
          <div className="empty">
            <p>Edit your rules above, then click <strong>Validate with Pack</strong>.</p>
          </div>
        `}
      </div>
    </div>
  `;
}

// ── BoreholeMap ───────────────────────────────────────────────────────────────
function BoreholeMap({ locations, selectedId, onSelect }) {
  const mapped = locations.filter(l => l.easting != null && l.northing != null);
  const W = 328, H = 220, PAD = 28;

  let plot = null;
  if (mapped.length > 0) {
    const es = mapped.map(l => l.easting),  ns = mapped.map(l => l.northing);
    const minE = Math.min(...es), maxE = Math.max(...es);
    const minN = Math.min(...ns), maxN = Math.max(...ns);
    const rE = Math.max(maxE - minE, 1), rN = Math.max(maxN - minN, 1);
    const sx = e => PAD + ((e - minE) / rE) * (W - PAD * 2);
    const sy = n => H - PAD - ((n - minN) / rN) * (H - PAD * 2);

    plot = html`
      <div className="map-svg-wrap">
        <svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
          ${[0,.25,.5,.75,1].map(t => html`
            <line key=${'eg'+t} x1=${PAD+t*(W-PAD*2)} y1=${PAD} x2=${PAD+t*(W-PAD*2)} y2=${H-PAD} stroke="#e5e7eb" strokeWidth="0.5"/>
            <line key=${'ng'+t} x1=${PAD} y1=${PAD+t*(H-PAD*2)} x2=${W-PAD} y2=${PAD+t*(H-PAD*2)} stroke="#e5e7eb" strokeWidth="0.5"/>
          `)}
          <text x=${W/2} y=${H-6} fontSize="9" textAnchor="middle" fill="#9ca3af">Easting →</text>
          <text x="8" y=${H/2} fontSize="9" textAnchor="middle" fill="#9ca3af" transform=${`rotate(-90,8,${H/2})`}>↑ Northing</text>
          ${mapped.map(loc => html`
            <g key=${loc.id} style=${s('cursor:pointer')} onClick=${()=>onSelect(loc)}>
              <circle cx=${sx(loc.easting)} cy=${sy(loc.northing)} r="6"
                fill=${selectedId===loc.id?'var(--navy)':'#3b82f6'}
                stroke=${selectedId===loc.id?'#93c5fd':'#1d4ed8'} strokeWidth="1.5"/>
              <text x=${sx(loc.easting)} y=${sy(loc.northing)-9}
                fontSize="9" textAnchor="middle"
                fill=${selectedId===loc.id?'var(--navy)':'#374151'}
                fontWeight=${selectedId===loc.id?'700':'400'}
              >${loc.id}</text>
            </g>
          `)}
        </svg>
      </div>
    `;
  }

  return html`
    <div className="map-card">
      <div className="map-card-head">Borehole Locations (${locations.length})</div>
      <div className="map-card-body">
        ${plot ?? html`<p style=${s('font-size:13px;color:var(--muted)')}>No coordinate data (LOCA_NATE / LOCA_NATN) in this file.</p>`}
        <div className="bh-grid">
          ${locations.map(loc => html`
            <button key=${loc.id}
              className=${`bh-btn${selectedId===loc.id?' active':''}`}
              title=${loc.depth!=null?`Final depth: ${loc.depth} m`:''}
              onClick=${()=>onSelect(loc)}
            >${loc.id}</button>
          `)}
        </div>
      </div>
    </div>
  `;
}

// ── LogSheet ──────────────────────────────────────────────────────────────────
function LogSheet({ loc, fileBytes, wasmReady, fileInfo }) {
  const [data, setData] = useState(null);
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    if (!loc || !fileBytes || !wasmReady) { setData(null); return; }
    setBusy(true);
    setTimeout(() => {
      try {
        const geol = JSON.parse(get_group_rows(fileBytes, 'GEOL')).filter(r => r.LOCA_ID === loc.id);
        const samp = JSON.parse(get_group_rows(fileBytes, 'SAMP')).filter(r => r.LOCA_ID === loc.id);
        const ispt = JSON.parse(get_group_rows(fileBytes, 'ISPT')).filter(r => r.LOCA_ID === loc.id);
        const wstk = JSON.parse(get_group_rows(fileBytes, 'WSTK')).filter(r => r.LOCA_ID === loc.id);
        const locaRow = JSON.parse(get_group_rows(fileBytes, 'LOCA')).find(r => r.LOCA_ID === loc.id) ?? {};
        setData({ geol, samp, ispt, wstk, locaRow });
      } catch(_) { setData(null); }
      setBusy(false);
    }, 0);
  }, [loc?.id, fileBytes, wasmReady]);

  if (!loc) return html`
    <div className="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style=${s('color:var(--muted)')}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25"/>
        <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 19.5h16.5M3.75 15h16.5M3.75 10.5H9"/>
      </svg>
      <p>Select a borehole from the list to view its log.</p>
    </div>
  `;

  if (busy || !data) return html`
    <div className="log-pro-wrap">
      <div style=${s('padding:40px;text-align:center;color:var(--muted);font-size:13px')}>
        ${busy ? 'Loading log data…' : 'No log data available for this borehole.'}
      </div>
    </div>
  `;

  const { geol, samp, ispt, wstk, locaRow } = data;

  // Depth range
  const maxDepth = Math.max(
    loc.depth ?? 0,
    ...geol.map(r => +(r.GEOL_BASE ?? 0)),
    ...ispt.map(r => +(r.ISPT_TOP ?? 0)),
    ...samp.map(r => +(r.SAMP_TOP ?? 0)),
    5
  );
  const depthCeil = Math.ceil(maxDepth);
  const SCALE = 15; // px per metre
  const dy = d => d * SCALE;
  const LOG_H = dy(depthCeil) + 4;

  // Column x positions
  const C = {
    axisX:  44,
    litho0: 48,  litho1: 128,   // 80px lithology
    desc0:  132, desc1:  348,   // 216px description
    spt0:   352, spt1:   468,   // 116px SPT (0–60)
    samp0:  472, samp1:  510,   // 38px samples
    wat0:   514, wat1:   532,   // 18px water
    W:      536,
  };
  const N_MAX = 60;
  const N_SCALE = C.spt1 - C.spt0;
  const sptPx = n => (Math.min(n, N_MAX) / N_MAX) * N_SCALE;

  // Build geology legend
  const legendEntries = [];
  const seenGeol = new Set();
  for (const r of geol) {
    const desc = r.GEOL_DESC ?? '';
    const lbl = geolLabel(desc);
    if (!seenGeol.has(lbl)) { seenGeol.add(lbl); legendEntries.push({ color: geolColor(desc), label: lbl }); }
  }

  return html`
    <div className="log-pro-wrap">
      <!-- Title block -->
      <div className="log-pro-title">
        <div className="log-pro-brand">
          <div className="company">GeoFlow</div>
          <div className="doctype">Borehole Log</div>
        </div>
        <div className="log-pro-meta-grid">
          <div className="log-pro-meta-cell">
            <div className="lbl">Project</div>
            <div className="val">${fileInfo?.project || '—'}</div>
          </div>
          <div className="log-pro-meta-cell">
            <div className="lbl">Borehole ID</div>
            <div className="val">${loc.id}</div>
          </div>
          <div className="log-pro-meta-cell">
            <div className="lbl">Final Depth</div>
            <div className="val">${loc.depth != null ? loc.depth + ' m' : '—'}</div>
          </div>
          <div className="log-pro-meta-cell">
            <div className="lbl">Easting (m E)</div>
            <div className="val">${loc.easting != null ? loc.easting.toFixed(1) : '—'}</div>
          </div>
          <div className="log-pro-meta-cell">
            <div className="lbl">Northing (m N)</div>
            <div className="val">${loc.northing != null ? loc.northing.toFixed(1) : '—'}</div>
          </div>
          <div className="log-pro-meta-cell">
            <div className="lbl">Ground Level (mOD)</div>
            <div className="val">${locaRow.LOCA_GL ?? '—'}</div>
          </div>
        </div>
      </div>

      <!-- SVG log body -->
      <div className="log-pro-body">
        <svg width=${C.W} height=${32 + LOG_H} viewBox="0 0 ${C.W} ${32 + LOG_H}"
          xmlns="http://www.w3.org/2000/svg" fontFamily="system-ui, sans-serif">

          <!-- Header row -->
          <rect x="0" y="0" width=${C.W} height="30" fill="#1e3a5f"/>
          <text x=${C.axisX / 2} y="19" fontSize="8" fontWeight="700" textAnchor="middle" fill="#cbd5e1">Depth (m)</text>
          <text x=${(C.litho0 + C.litho1) / 2} y="19" fontSize="8.5" fontWeight="700" textAnchor="middle" fill="#fff">Lithology</text>
          <text x=${(C.desc0 + C.desc1) / 2} y="19" fontSize="8.5" fontWeight="700" textAnchor="middle" fill="#fff">Description</text>
          <text x=${(C.spt0 + C.spt1) / 2} y="13" fontSize="8.5" fontWeight="700" textAnchor="middle" fill="#fff">SPT N-Value</text>
          <text x=${C.spt0 + 1} y="25" fontSize="7" fill="#94a3b8">0</text>
          <text x=${C.spt0 + N_SCALE / 2} y="25" fontSize="7" textAnchor="middle" fill="#94a3b8">30</text>
          <text x=${C.spt1 - 1} y="25" fontSize="7" textAnchor="end" fill="#94a3b8">60</text>
          <text x=${(C.samp0 + C.samp1) / 2} y="19" fontSize="8.5" fontWeight="700" textAnchor="middle" fill="#fff">Smpl</text>
          <text x=${(C.wat0 + C.wat1) / 2} y="19" fontSize="8.5" fontWeight="700" textAnchor="middle" fill="#fff">WL</text>
          ${[C.litho0, C.desc0, C.spt0, C.samp0, C.wat0].map((x, i) => html`
            <line key=${i} x1=${x} y1="0" x2=${x} y2="30" stroke="#334155" strokeWidth="0.5"/>
          `)}

          <!-- Log body -->
          <g transform="translate(0,30)">
            <!-- Column backgrounds -->
            <rect x="0"      y="0" width=${C.axisX}            height=${LOG_H} fill="#f8fafc"/>
            <rect x=${C.litho0} y="0" width=${C.litho1-C.litho0} height=${LOG_H} fill="#fafafa" stroke="#e2e8f0" strokeWidth="0.5"/>
            <rect x=${C.desc0}  y="0" width=${C.desc1-C.desc0}   height=${LOG_H} fill="#fff"    stroke="#e2e8f0" strokeWidth="0.5"/>
            <rect x=${C.spt0}   y="0" width=${C.spt1-C.spt0}     height=${LOG_H} fill="#fafafa" stroke="#e2e8f0" strokeWidth="0.5"/>
            <rect x=${C.samp0}  y="0" width=${C.samp1-C.samp0}   height=${LOG_H} fill="#f8fafc" stroke="#e2e8f0" strokeWidth="0.5"/>
            <rect x=${C.wat0}   y="0" width=${C.wat1-C.wat0}     height=${LOG_H} fill="#f0f9ff" stroke="#e2e8f0" strokeWidth="0.5"/>

            <!-- Depth axis -->
            <line x1=${C.axisX} y1="0" x2=${C.axisX} y2=${LOG_H} stroke="#374151" strokeWidth="1"/>

            <!-- SPT sub-grid lines -->
            ${[15, 30, 45].map(n => html`
              <line key=${'sg'+n}
                x1=${C.spt0 + sptPx(n)} y1="0"
                x2=${C.spt0 + sptPx(n)} y2=${LOG_H}
                stroke=${n===30 ? '#dde1e7' : '#e5e7eb'} strokeWidth=${n===30 ? 0.8 : 0.5}/>
            `)}

            <!-- Depth ticks + grid every 5m -->
            ${[...Array(depthCeil + 1)].map((_, i) => {
              const y = dy(i);
              const major = i % 5 === 0;
              return html`
                <g key=${'d'+i}>
                  <line x1=${major ? C.axisX-8 : C.axisX-4} y1=${y} x2=${C.axisX} y2=${y}
                    stroke="#374151" strokeWidth=${major ? 1 : 0.5}/>
                  ${major && html`
                    <text x=${C.axisX-10} y=${y+3} fontSize="9" textAnchor="end" fill="#374151" fontWeight="600">${i}</text>
                    <line x1=${C.litho0} y1=${y} x2=${C.W} y2=${y} stroke="#dde1e7" strokeWidth="0.5"/>
                  `}
                </g>
              `;
            })}

            <!-- GEOL layers -->
            ${geol.map((r, i) => {
              const top  = +(r.GEOL_TOP  ?? 0);
              const base = +(r.GEOL_BASE ?? top + 1);
              const yTop = dy(top), yBot = dy(base), h = yBot - yTop;
              const col  = geolColor(r.GEOL_DESC ?? '');
              const lbl  = geolLabel(r.GEOL_DESC ?? '');
              const desc = String(r.GEOL_DESC ?? '');
              return html`
                <g key=${'g'+i}>
                  <rect x=${C.litho0+1} y=${yTop} width=${C.litho1-C.litho0-2} height=${h}
                    fill=${col} stroke="#6b7280" strokeWidth="0.5" opacity="0.9">
                    <title>${desc} (${top}–${base} m)</title>
                  </rect>
                  <line x1=${C.litho0} y1=${yBot} x2=${C.spt1} y2=${yBot}
                    stroke="#9ca3af" strokeWidth="0.6" strokeDasharray="3,2"/>
                  ${h > 12 && html`
                    <text x=${C.desc0+4} y=${yTop+11} fontSize="8.5" fontWeight="700" fill="#1f2937">${lbl}</text>
                  `}
                  ${h > 23 && html`
                    <text x=${C.desc0+4} y=${yTop+21} fontSize="8" fill="#374151">
                      ${desc.length > 50 ? desc.slice(0,48)+'…' : desc}
                    </text>
                  `}
                  ${h > 36 && desc.length > 48 && html`
                    <text x=${C.desc0+4} y=${yTop+31} fontSize="8" fill="#374151">
                      ${desc.slice(48, 96).length > 48 ? desc.slice(48,94)+'…' : desc.slice(48)}
                    </text>
                  `}
                </g>
              `;
            })}

            <!-- ISPT SPT bars -->
            ${ispt.map((r, i) => {
              const depth = +(r.ISPT_TOP ?? 0);
              const n = +(r.ISPT_NVAL ?? 0);
              const y = dy(depth);
              const bw = sptPx(n);
              const refusal = n >= N_MAX;
              return html`
                <g key=${'i'+i}>
                  <rect x=${C.spt0} y=${y-4} width=${bw} height="8"
                    fill=${refusal ? '#dc2626' : '#f97316'}
                    stroke=${refusal ? '#991b1b' : '#c2410c'}
                    strokeWidth="0.5" rx="1" opacity="0.85">
                    <title>SPT N=${n} at ${depth} m${refusal?' (refusal)':''}</title>
                  </rect>
                  ${n > 0 && html`
                    <text x=${C.spt0+bw+2} y=${y+3.5} fontSize="7.5" fill="#374151">
                      ${refusal ? '60+' : n}
                    </text>
                  `}
                </g>
              `;
            })}

            <!-- SAMP markers -->
            ${samp.map((r, i) => {
              const depth = +(r.SAMP_TOP ?? 0);
              const y = dy(depth);
              const typ = String(r.SAMP_TYPE ?? 'B').slice(0,2);
              return html`
                <g key=${'s'+i}>
                  <rect x=${C.samp0+2} y=${y-4} width=${C.samp1-C.samp0-4} height="8"
                    fill="#3b82f6" stroke="#1d4ed8" strokeWidth="0.5" rx="1">
                    <title>Sample ${r.SAMP_REF ?? r.SAMP_ID ?? i} (${r.SAMP_TYPE}) at ${depth} m</title>
                  </rect>
                  <text x=${(C.samp0+C.samp1)/2} y=${y+3.5} fontSize="6.5" textAnchor="middle" fill="white" fontWeight="700">${typ}</text>
                </g>
              `;
            })}

            <!-- WSTK water strikes -->
            ${wstk.map((r, i) => {
              const depth = +(r.WSTK_DPTH ?? 0);
              const cy = dy(depth);
              const cx = (C.wat0+C.wat1)/2;
              return html`
                <polygon key=${'w'+i}
                  points="${cx},${cy-6} ${cx+6},${cy} ${cx},${cy+6} ${cx-6},${cy}"
                  fill="#0ea5e9" stroke="#0369a1" strokeWidth="0.5">
                  <title>Water strike at ${depth} m</title>
                </polygon>
              `;
            })}
          </g>
        </svg>
      </div>

      <!-- Legend -->
      ${(legendEntries.length > 0 || samp.length > 0 || ispt.length > 0 || wstk.length > 0) && html`
        <div className="log-pro-legend">
          <span style=${s('font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-right:4px')}>Legend:</span>
          ${legendEntries.map((e, i) => html`
            <div key=${i} className="legend-item">
              <div className="legend-swatch" style=${{ background: e.color, border: '1px solid rgba(0,0,0,.18)' }}></div>
              <span>${e.label}</span>
            </div>
          `)}
          ${samp.length > 0 && html`
            <div className="legend-item">
              <div className="legend-swatch" style=${s('background:#3b82f6;border:1px solid #1d4ed8')}></div>
              <span>Sample</span>
            </div>
          `}
          ${ispt.length > 0 && html`
            <div className="legend-item">
              <div className="legend-swatch" style=${s('background:#f97316;border:1px solid #c2410c')}></div>
              <span>SPT N-Value</span>
            </div>
          `}
          ${wstk.length > 0 && html`
            <div className="legend-item">
              <div className="legend-swatch" style=${s('background:#0ea5e9;border:1px solid #0369a1;transform:rotate(45deg)')}></div>
              <span>Water Strike</span>
            </div>
          `}
        </div>
      `}
    </div>
  `;
}

// ── UploadTab ─────────────────────────────────────────────────────────────────

      </div>
      <div className=${`status${status.type?' '+status.type:''}`}>${status.msg}</div>

          <span><strong>${fileInfo.total_rows}</strong> rows</span>
          ${fileInfo.locations > 0 ? html`<span><strong>${fileInfo.locations}</strong> locations</span>` : null}

          ${fileInfo.project ? html`<span>"${fileInfo.project}"</span>` : null}

      ${diagnostics !== null && html`
        <div className="summary">
          ${diagnostics.length === 0
            ? html`<span className="badge badge-ok">✓ No issues found</span>`
            : html`
              ${counts.error   ? html`<span className="badge badge-error">✕ ${counts.error} error${counts.error!==1?'s':''}</span>` : null}
              ${counts.warning ? html`<span className="badge badge-warning">⚠ ${counts.warning} warning${counts.warning!==1?'s':''}</span>` : null}
              ${counts.info    ? html`<span className="badge badge-info">ℹ ${counts.info} info</span>` : null}
            `
          }
        </div>
      `}
    </div>
  `;
}

// ── ValidationMapTab ──────────────────────────────────────────────────────────
function ValidationMapTab({ diagnostics, locations, fileBytes, wasmReady, onValidate }) {
  const [packYaml, setPackYaml]     = useState('');
  const [packName, setPackName]     = useState('');
  const [packDiags, setPackDiags]   = useState(null);
  const [validating, setValidating] = useState(false);
  const [selectedLoc, setSelectedLoc] = useState(null);
  const packRef = useRef(null);

  function loadPack(file) {
    const r = new FileReader();
    r.onload = e => { setPackYaml(e.target.result); setPackName(file.name); setPackDiags(null); };
    r.readAsText(file);
  }

  function runWithPack() {
    if (!packYaml || !fileBytes || !wasmReady) return;
    setValidating(true);
    setTimeout(() => {
      try {
        const result = JSON.parse(validate_ags_with_rules(fileBytes, packYaml));
        setPackDiags(Array.isArray(result) ? result : null);
      } catch(_) {}
      setValidating(false);
    }, 0);
  }

  // Pack diagnostics override built-in when a pack is active
  const activeDiags = packDiags ?? diagnostics;

  // Counts for summary bar
  const counts = useMemo(() => {
    if (!activeDiags) return null;
    const c = { error: 0, warning: 0, info: 0 };
    activeDiags.forEach(d => { if (d.severity in c) c[d.severity]++; });
    return c;
  }, [activeDiags]);

  return html`
    <div>
      <!-- Validation control toolbar -->
      <div className="val-toolbar">
        <button className="btn-primary" disabled=${!fileBytes || !wasmReady} onClick=${onValidate}>
          ▶ Run Validation
        </button>
        <div className="val-toolbar-sep"></div>

        <!-- Rule pack file upload -->
        <input ref=${packRef} type="file" accept=".yml,.yaml" style=${s('display:none')}
          onChange=${e => { if (e.target.files[0]) loadPack(e.target.files[0]); }} />
        <button className="btn-secondary" onClick=${() => packRef.current.click()}>
          ${packName
            ? html`<span className="val-pack-badge">${packName}</span>`
            : '+ Upload Rule Pack (.yml)'}
        </button>

        ${packYaml && html`
          <button className="btn-primary"
            disabled=${!fileBytes || !wasmReady || validating}
            onClick=${runWithPack}>
            ${validating ? 'Validating…' : 'Validate with Pack'}
          </button>
          <button className="btn-secondary"
            onClick=${() => { setPackYaml(''); setPackName(''); setPackDiags(null); }}>
            ✕ Clear Pack
          </button>
        `}
      </div>

      <!-- Summary bar -->
      ${counts !== null && html`
        <div className="val-summary-bar">
          ${activeDiags.length === 0
            ? html`<span className="badge badge-ok">✓ No issues found</span>`
            : html`
              ${counts.error   ? html`<span className="badge badge-error">✕ ${counts.error} error${counts.error!==1?'s':''}</span>` : null}
              ${counts.warning ? html`<span className="badge badge-warning">⚠ ${counts.warning} warning${counts.warning!==1?'s':''}</span>` : null}
              ${counts.info    ? html`<span className="badge badge-info">ℹ ${counts.info} info</span>` : null}
            `
          }
          ${packDiags && html`
            <span style=${s('font-size:12px;color:var(--muted)')}>— results from pack: <strong>${packName}</strong></span>
          `}
        </div>
      `}

      <!-- Main content grid -->
      ${!fileBytes ? html`
        <div className="empty">
          <p>Load an AGS file in <strong>Upload &amp; Convert</strong>, then click <strong>Run Validation</strong>.</p>
        </div>
      ` : html`
        <div className="val-map-grid">
          <div>
            ${activeDiags !== null
              ? html`<${DiagnosticsLog} diagnostics=${activeDiags} />`
              : html`<div className="empty" style=${s('padding:40px')}><p>Click <strong>▶ Run Validation</strong> above to check this file.</p></div>`
            }
          </div>
          <div>
            ${locations.length > 0
              ? html`<${BoreholeMap} locations=${locations} selectedId=${selectedLoc?.id} onSelect=${setSelectedLoc} />`
              : html`<div className="empty" style=${s('padding:24px')}><p>No boreholes (LOCA group) in this file.</p></div>`
            }
            ${selectedLoc && html`
              <${BoreholeSvgPanel} loc=${selectedLoc} fileBytes=${fileBytes} wasmReady=${wasmReady} />
            `}
          </div>
        </div>
      `}
    </div>
  `;
}

// ── DiffTab ───────────────────────────────────────────────────────────────────
function DiffTab({ wasmReady }) {
  const [bytesA, setBytesA]   = useState(null);
  const [bytesB, setBytesB]   = useState(null);
  const [nameA, setNameA]     = useState('');
  const [nameB, setNameB]     = useState('');
  const [dragA, setDragA]     = useState(false);
  const [dragB, setDragB]     = useState(false);
  const [result, setResult]   = useState(null);
  const [status, setStatus]   = useState('');
  const refA = useRef(null), refB = useRef(null);

  function loadFile(file, side) {
    const r = new FileReader();
    r.onload = e => {
      const b = new Uint8Array(e.target.result);
      if (side === 'A') { setBytesA(b); setNameA(file.name); }
      else              { setBytesB(b); setNameB(file.name); }
    };
    r.readAsArrayBuffer(file);
  }

  function compare() {
    if (!bytesA || !bytesB || !wasmReady) return;
    setStatus('Comparing…'); setResult(null);
    setTimeout(() => {
      try { setResult(JSON.parse(diff_ags(bytesA, bytesB))); setStatus(''); }
      catch(e) { setStatus('Error: ' + e.message); }
    }, 0);
  }

  function zone(side, drag, setDrag, ref, name, bytes) {
    return html`
      <div>
        <div className="diff-zone-lbl">File ${side} ${side==='A'?'(before)':'(after)'}</div>
        <div className=${`diff-drop${drag?' drag-over':''}${bytes?' loaded':''}`}
          onClick=${()=>ref.current.click()}
          onDragOver=${e=>{e.preventDefault();setDrag(true);}}
          onDragLeave=${()=>setDrag(false)}
          onDrop=${e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0],side);}}
        >
          <input ref=${ref} type="file" accept=".ags" style=${s('display:none')}
            onChange=${e=>{if(e.target.files[0])loadFile(e.target.files[0],side);}} />
          <p>${name||`Drop or click — AGS file ${side}`}</p>
        </div>
      </div>
    `;
  }

  return html`
    <div>
      <div className="diff-zones">
        ${zone('A', dragA, setDragA, refA, nameA, bytesA)}
        ${zone('B', dragB, setDragB, refB, nameB, bytesB)}
      </div>
      <div className="actions">
        <button className="btn-primary" disabled=${!bytesA||!bytesB||!wasmReady} onClick=${compare}>Compare</button>
      </div>
      ${status && html`<div style=${s('margin-top:10px;font-size:13px;color:var(--muted)')}>${status}</div>`}
      ${result && html`<${DiffResult} d=${result} />`}
    </div>
  `;
}

function DiffResult({ d }) {
  if (d.identical) return html`<div className="diff-identical" style=${s('margin-top:20px')}>✓ Files are identical</div>`;
  return html`
    <div className="diff-result">
      ${d.full_unified_lines?.length ? html`
        <details className="diff-group-row diff-full-toggle">
          <summary className="diff-group-hdr">Full file unified diff</summary>
          <div className="diff-section">
            <${UnifiedDiffBlock} lines=${d.full_unified_lines} />
          </div>
        </details>
      ` : null}
      ${d.only_in_a?.length ? html`
        <div className="diff-group-row">
          <div className="diff-group-hdr">Groups only in A</div>
          <div style=${s('padding:10px 16px;font-size:12px')}>
            ${d.only_in_a.map(g => html`<span key=${g} className="diff-only diff-removed">− ${g}</span>`)}
          </div>
        </div>
      ` : null}
      ${d.only_in_b?.length ? html`
        <div className="diff-group-row">
          <div className="diff-group-hdr">Groups only in B</div>
          <div style=${s('padding:10px 16px;font-size:12px')}>
            ${d.only_in_b.map(g => html`<span key=${g} className="diff-only diff-added">+ ${g}</span>`)}
          </div>
        </div>
      ` : null}
      ${(d.groups||[]).map(g => html`
        <details key=${g.group} className="diff-group-row diff-details">
          <summary className="diff-group-hdr">
            <span>${g.group}</span>
            <span className="diff-group-summary">
              ${g.rows_unchanged ? html`<span className="diff-badge diff-unchanged">${g.rows_unchanged} unchanged</span>` : null}
              ${g.rows_added     ? html`<span className="diff-badge diff-added">+${g.rows_added} added</span>`           : null}
              ${g.rows_removed   ? html`<span className="diff-badge diff-removed">−${g.rows_removed} removed</span>`      : null}
              ${g.rows_modified  ? html`<span className="diff-badge diff-modified">~${g.rows_modified} modified</span>`   : null}
            </span>
          </summary>
          <div className="diff-group-body">
            ${g.changed_rows?.length ? html`
              <div className="diff-section">
                <div className="diff-section-title">Modified rows</div>
                <div className="diff-row-list">
                  ${g.changed_rows.map(row => html`
                    <div key=${row.key} className="diff-row-card">
                      <div className="diff-row-key">${row.key}</div>
                      <div className="diff-field-list">
                        ${row.changes.map(change => html`
                          <div key=${change.heading} className="diff-field-change">
                            <strong>${change.heading}</strong>
                            <span className="diff-field-before"> − ${change.before}</span>
                            <span className="diff-field-after"> + ${change.after}</span>
                          </div>
                        `)}
                      </div>
                    </div>
                  `)}
                </div>
              </div>
            ` : null}
            ${g.added_rows?.length ? html`
              <div className="diff-section">
                <div className="diff-section-title">Added rows</div>
                <div className="diff-row-list">
                  ${g.added_rows.map(row => html`<${RowPreviewCard} row=${row} tone="added" />`)}
                </div>
              </div>
            ` : null}
            ${g.removed_rows?.length ? html`
              <div className="diff-section">
                <div className="diff-section-title">Removed rows</div>
                <div className="diff-row-list">
                  ${g.removed_rows.map(row => html`<${RowPreviewCard} row=${row} tone="removed" />`)}
                </div>
              </div>
            ` : null}
            ${g.unified_lines?.length ? html`
              <div className="diff-section">
                <div className="diff-section-title">Line diff</div>
                <${UnifiedDiffBlock} lines=${g.unified_lines} />
              </div>
            ` : null}
          </div>
        </details>
      `)}
    </div>
  `;
}

function RowPreviewCard({ row, tone }) {
  return html`
    <div className="diff-row-card">
      <div className="diff-row-key">
        <span className=${`diff-badge ${tone === 'added' ? 'diff-added' : 'diff-removed'}`}>
          ${tone === 'added' ? '+' : '−'}
        </span>
        ${' '}
        ${row.key}
      </div>
      <pre className="diff-preview">
        ${row.fields.map((line, idx) => html`<span key=${idx} className="diff-preview-line">${line}</span>`)}
      </pre>
    </div>
  `;
}

function UnifiedDiffBlock({ lines }) {
  return html`
    <pre className="diff-unified">
      ${lines.map((line, idx) => {
        const cls =
          line.kind === 'file' ? 'diff-line-file' :
          line.kind === 'hunk' ? 'diff-line-hunk' :
          line.kind === 'add' ? 'diff-line-add' :
          line.kind === 'remove' ? 'diff-line-remove' :
          'diff-line-context';
        return html`<span key=${idx} className=${cls}>${line.text}${'\n'}</span>`;
      })}
    </pre>
  `;
}

// ── Data tab helpers ──────────────────────────────────────────────────────────
function cellValue(val) {
  if (val === null || val === undefined || val === '') return null;
  return val;
}

function truncate(s, n = 60) {
  const t = String(s);
  return t.length > n ? t.slice(0, n) + '…' : t;
}

// ── MiniTable (compact read-only table used inside OntologyView) ──────────────
function MiniTable({ rows, meta, onKeyClick }) {
  if (!rows || rows.length === 0) return null;
  const headings = meta ?? Object.keys(rows[0]).map(name => ({ name, unit: '', is_id: false }));
  return html`
    <div className="onto-tbl-wrap">
      <table className="onto-tbl">
        <thead>
          <tr>
            ${headings.map(h => html`<th key=${h.name} title=${h.unit||''}>${h.name}</th>`)}
          </tr>
        </thead>
        <tbody>
          ${rows.map((row, ri) => html`
            <tr key=${ri}>
              ${headings.map(h => {
                const v = cellValue(row[h.name]);
                if (v === null) return html`<td key=${h.name} className="null">—</td>`;
                const isNum = typeof v === 'number';
                if (h.is_id && v !== '') return html`
                  <td key=${h.name}>
                    <button className="key-chip" onClick=${() => onKeyClick(h.name, v)}>${v}</button>
                  </td>`;
                return html`<td key=${h.name} className=${isNum?'num':''} title=${String(v)}>${truncate(String(v),40)}</td>`;
              })}
            </tr>
          `)}
        </tbody>
      </table>
    </div>
  `;
}

// ── OntologyView ──────────────────────────────────────────────────────────────
function OntologyView({ keyField, keyValue, allData, allMeta, onBack, onKeyClick }) {
  const [expanded, setExpanded] = useState({});

  // Find all groups that have at least one row matching keyField = keyValue
  const matches = useMemo(() => {
    const valStr = String(keyValue);
    const result = [];
    for (const [group, rows] of Object.entries(allData)) {
      const hit = rows.filter(r => {
        const v = r[keyField];
        return v !== null && v !== undefined && String(v) === valStr;
      });
      if (hit.length > 0) result.push({ group, rows: hit });
    }
    // Put the group whose name matches the field prefix first (e.g. LOCA for LOCA_ID)
    const prefix = keyField.replace(/_ID$|_REF$/, '');
    result.sort((a, b) => {
      if (a.group === prefix) return -1;
      if (b.group === prefix) return  1;
      return a.group.localeCompare(b.group);
    });
    return result;
  }, [allData, keyField, keyValue]);

  // Start with all groups expanded
  useEffect(() => {
    const init = {};
    matches.forEach(m => { init[m.group] = true; });
    setExpanded(init);
  }, [keyField, keyValue]);

  const toggle = g => setExpanded(e => ({ ...e, [g]: !e[g] }));

  return html`
    <div>
      <div className="onto-back-bar">
        <button className="onto-back-btn" onClick=${onBack}>← Back</button>
        <span className="onto-title">
          <span className="onto-field">${keyField}</span>
          ${' = '}
          <span className="key-chip" style=${s('font-size:13px;padding:3px 12px')}>${keyValue}</span>
        </span>
        <span style=${s('margin-left:auto;font-size:12px;color:var(--muted)')}>${matches.length} group${matches.length!==1?'s':''}</span>
      </div>
      ${matches.length === 0 ? html`
        <div className="empty"><p>No records found for ${keyField} = "${keyValue}".</p></div>
      ` : html`
        <div className="onto-scroll">
          ${matches.map(({ group, rows }) => {
            const meta = allMeta[group] ?? null;
            const isOpen = !!expanded[group];
            return html`
              <div key=${group} className="onto-group-section">
                <div className="onto-group-hdr" onClick=${() => toggle(group)}>
                  <span className="onto-chevron ${isOpen?'open':''}">▶</span>
                  <span>${group}</span>
                  <span className="onto-row-count">${rows.length} row${rows.length!==1?'s':''}</span>
                </div>
                ${isOpen && html`
                  <${MiniTable} rows=${rows} meta=${meta} onKeyClick=${onKeyClick} />
                `}
              </div>
            `;
          })}
        </div>
      `}
    </div>
  `;
}

// ── GroupTable ────────────────────────────────────────────────────────────────
const PAGE = 150;

function GroupTable({ groupName, rows, meta, onKeyClick }) {
  const [search,     setSearch]     = useState('');
  const [shown,      setShown]      = useState(PAGE);
  const [sortCol,    setSortCol]    = useState(null);
  const [sortDir,    setSortDir]    = useState(1);   // 1=asc, -1=desc
  const [colFilters, setColFilters] = useState({});

  useEffect(() => {
    setSearch(''); setShown(PAGE); setSortCol(null); setSortDir(1); setColFilters({});
  }, [groupName]);

  const headings = meta ?? Object.keys(rows[0] ?? {}).map(name => ({ name, unit: '', is_id: false }));

  const filtered = useMemo(() => {
    let r = rows;
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter(row => Object.values(row).some(v => v !== null && String(v).toLowerCase().includes(q)));
    }
    for (const [col, val] of Object.entries(colFilters)) {
      if (!val.trim()) continue;
      const q = val.toLowerCase();
      r = r.filter(row => { const v = row[col]; return v !== null && v !== undefined && String(v).toLowerCase().includes(q); });
    }
    if (sortCol) {
      r = [...r].sort((a, b) => {
        const av = a[sortCol], bv = b[sortCol];
        if (av == null) return sortDir;
        if (bv == null) return -sortDir;
        if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sortDir;
        return String(av).localeCompare(String(bv), undefined, { numeric: true }) * sortDir;
      });
    }
    return r;
  }, [rows, search, colFilters, sortCol, sortDir]);

  const visible = filtered.slice(0, shown);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d * -1);
    else { setSortCol(col); setSortDir(1); }
  }

  function exportCsv() {
    const cols = headings.map(h => h.name);
    const esc  = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
    const lines = [cols.map(esc).join(','), ...filtered.map(row => cols.map(c => esc(row[c] ?? '')).join(','))];
    downloadBlob(new Blob([lines.join('\r\n')], { type: 'text/csv' }), groupName + '.csv');
  }

  const hasActiveFilter = search.trim() || Object.values(colFilters).some(v => v.trim());

  return html`
    <div className="data-panel">
      <div className="data-panel-head">
        <h2>${groupName}</h2>
        <span style=${s('font-size:12px;color:var(--muted)')}>${rows.length} row${rows.length!==1?'s':''}</span>
        <div className="data-panel-actions">
          <input
            className="data-search"
            placeholder="Search all…"
            value=${search}
            onInput=${e => { setSearch(e.target.value); setShown(PAGE); }}
          />
          <button className="tbl-export-btn" onClick=${exportCsv} title="Export filtered rows to CSV">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
              <path strokeLinecap="round" d="M12 15V3m0 12-4-4m4 4 4-4M3 17v3a1 1 0 001 1h16a1 1 0 001-1v-3"/>
            </svg>
            CSV
          </button>
        </div>
      </div>
      <div className="data-tbl-wrap">
        <table className="data-tbl">
          <thead>
            <!-- Header row with sort -->
            <tr>
              <th>#</th>
              ${headings.map(h => {
                const active = sortCol === h.name;
                return html`
                  <th key=${h.name} className="sortable" onClick=${() => { toggleSort(h.name); setShown(PAGE); }}>
                    ${h.name}
                    <span className=${'sort-ind' + (active ? (sortDir===1?' asc':' desc') : '')}>
                      ${active ? (sortDir===1 ? '↑' : '↓') : '⇅'}
                    </span>
                    ${h.unit ? html`<span className="th-unit">${h.unit}</span>` : null}
                  </th>
                `;
              })}
            </tr>
            <!-- Per-column filter row -->
            <tr className="col-filter-row">
              <th></th>
              ${headings.map(h => html`
                <th key=${'f'+h.name}>
                  <input
                    className="col-filter-input"
                    placeholder="filter…"
                    value=${colFilters[h.name] ?? ''}
                    onInput=${e => { setColFilters(f => ({ ...f, [h.name]: e.target.value })); setShown(PAGE); }}
                  />
                </th>
              `)}
            </tr>
          </thead>
          <tbody>
            ${visible.map((row, ri) => html`
              <tr key=${ri}>
                <td>${ri + 1}</td>
                ${headings.map(h => {
                  const v = cellValue(row[h.name]);
                  if (v === null) return html`<td key=${h.name} className="null">—</td>`;
                  const isNum = typeof v === 'number';
                  if (h.is_id) return html`
                    <td key=${h.name}>
                      <button className="key-chip" onClick=${() => onKeyClick(h.name, v)}
                        title="Show all records where ${h.name} = ${v}">
                        ${String(v)}
                      </button>
                    </td>`;
                  return html`
                    <td key=${h.name} className=${isNum?'num':''} title=${String(v)}>
                      ${truncate(String(v))}
                    </td>`;
                })}
              </tr>
            `)}
          </tbody>
        </table>
      </div>
      ${filtered.length > shown ? html`
        <div className="tbl-more">
          Showing ${shown} of ${filtered.length} rows
          <button className="btn-secondary" style=${s('padding:4px 12px;font-size:12px')}
            onClick=${() => setShown(n => n + PAGE)}>
            Show ${Math.min(PAGE, filtered.length - shown)} more
          </button>
        </div>
      ` : hasActiveFilter ? html`
        <div className="tbl-more">${filtered.length} of ${rows.length} rows match filter</div>
      ` : null}
    </div>
  `;
}
