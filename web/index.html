<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoFlow — AGS Validator & Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0f2644;
      --blue:   #1a4080;
      --amber:  #d97706;
      --red:    #dc2626;
      --orange: #ea580c;
      --green:  #16a34a;
      --bg:     #f1f5f9;
      --card:   #ffffff;
      --border: #cbd5e1;
      --text:   #0f172a;
      --muted:  #64748b;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--navy);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header .hdr-sub { font-size: 12px; opacity: 0.55; margin-left: auto; }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .12s, border-color .12s;
    }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--blue);
      background: #eff6ff;
    }
    .drop-zone svg { width: 40px; height: 40px; color: var(--muted); margin-bottom: 12px; }
    .drop-zone p { color: var(--muted); line-height: 1.6; }
    .drop-zone strong { color: var(--text); }
    .file-name { margin-top: 10px; font-weight: 600; color: var(--blue); font-size: 13px; }

    /* ── Buttons ── */
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    button {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: var(--navy); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--blue); }
    .btn-secondary { background: #e2e8f0; color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #cbd5e1; }
    .btn-accent    { background: var(--amber); color: #fff; }
    .btn-accent:hover:not(:disabled)    { background: #b45309; }

    /* ── Status ── */
    .status { margin-top: 14px; font-size: 13px; color: var(--muted); min-height: 20px; }
    .status.loading { color: var(--blue); }
    .status.error   { color: var(--red);  }

    /* ── Summary badges ── */
    .summary { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-error   { background: #fef2f2; color: var(--red);    border: 1px solid #fecaca; }
    .badge-warning { background: #fff7ed; color: var(--orange);  border: 1px solid #fed7aa; }
    .badge-info    { background: #eff6ff; color: #2563eb;        border: 1px solid #bfdbfe; }
    .badge-ok      { background: #f0fdf4; color: var(--green);   border: 1px solid #bbf7d0; }

    /* ── File info bar ── */
    .file-info-bar {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .file-info-bar span strong { color: var(--text); }

    /* ── Two-column layout for validation/map tab ── */
    .val-map-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .val-map-grid { grid-template-columns: 1fr; }
    }

    /* ── Diagnostics log list ── */
    .diag-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .diag-panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .diag-panel-head h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
    .filter-pills { display: flex; gap: 6px; margin-left: auto; }
    .pill {
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .pill.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .diag-scroll { max-height: 560px; overflow-y: auto; }
    .log-row {
      display: grid;
      grid-template-columns: 44px 72px 120px 1fr;
      align-items: baseline;
      gap: 0 10px;
      padding: 7px 16px;
      border-bottom: 1px solid #f1f5f9;
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .log-row:last-child { border-bottom: none; }
    .log-row:hover { background: #f8fafc; }
    .log-sev {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-top: 1px;
    }
    .sev-error   { color: var(--red); }
    .sev-warning { color: var(--orange); }
    .sev-info    { color: #2563eb; }
    .log-rule  { color: var(--muted); font-size: 11px; }
    .log-loc   { color: var(--muted); font-size: 11px; }
    .log-msg   { color: var(--text); word-break: break-word; }

    /* ── Borehole map card ── */
    .map-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .map-card-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
    .map-card-body { padding: 16px; }
    .map-svg-wrap { border: 1px solid var(--border); border-radius: 4px; background: #f8fafc; overflow: hidden; }
    .bh-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .bh-btn {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: all .12s;
    }
    .bh-btn:hover  { border-color: var(--blue); color: var(--blue); }
    .bh-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* ── Borehole preview (map tab) ── */
    .bh-preview {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      overflow-x: auto;
    }
    .bh-preview-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .bh-preview-meta strong { color: var(--text); margin-right: 16px; }

    /* ── Log tab layout ── */
    .log-tab-grid {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 640px) {
      .log-tab-grid { grid-template-columns: 1fr; }
    }
    .bh-list-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: sticky;
      top: 16px;
    }
    .bh-list-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
    .bh-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: background .1s;
    }
    .bh-list-item:last-child { border-bottom: none; }
    .bh-list-item:hover { background: #f1f5f9; }
    .bh-list-item.active { background: var(--navy); color: #fff; }
    .bh-list-item .depth { font-size: 11px; opacity: 0.6; }

    /* ── Log sheet (formal borehole log) ── */
    .log-sheet {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .log-sheet-hdr {
      background: var(--navy);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .log-sheet-hdr h2 { font-size: 15px; font-weight: 700; }
    .log-sheet-hdr .version { margin-left: auto; font-size: 11px; opacity: 0.5; }
    .log-sheet-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 2px solid var(--navy);
    }
    .meta-cell {
      padding: 9px 16px;
      border-right: 1px solid var(--border);
      font-size: 12px;
    }
    .meta-cell:last-child { border-right: none; }
    .meta-cell .lbl {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .meta-cell .val {
      font-weight: 600;
      font-family: monospace;
      font-size: 13px;
      color: var(--text);
    }
    .log-sheet-col-hdr {
      display: flex;
      background: #f0f4f8;
      border-bottom: 1px solid var(--border);
      padding: 5px 20px;
    }
    .log-col-lbl {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: center;
    }
    .log-sheet-body {
      padding: 0 20px 8px;
      overflow-x: auto;
    }
    .log-sheet-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: #f8fafc;
      font-size: 11px;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch {
      width: 14px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Diff tab ── */
    .diff-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .diff-zone-lbl { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .diff-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: 13px;
      color: var(--muted);
    }
    .diff-drop:hover, .diff-drop.drag-over { border-color: var(--blue); background: #eff6ff; }
    .diff-drop.loaded { border-color: var(--green); background: #f0fdf4; color: var(--text); }
    .diff-result { margin-top: 20px; }
    .diff-identical { padding: 24px; text-align: center; color: var(--green); font-weight: 600; }
    .diff-group-row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .diff-group-hdr {
      padding: 10px 16px;
      font-family: monospace;
      font-weight: 700;
      font-size: 13px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .diff-badge { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .diff-added     { background: #dcfce7; color: #15803d; }
    .diff-removed   { background: #fee2e2; color: #b91c1c; }
    .diff-modified  { background: #fef9c3; color: #a16207; }
    .diff-unchanged { background: #f1f5f9; color: var(--muted); }
    .diff-only { font-family: monospace; color: var(--muted); padding: 4px 0; display: block; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }
    .empty svg { margin: 0 auto 14px; display: block; }
    .empty p { line-height: 1.6; }
    .empty strong { color: var(--text); }
  </style>
</head>
<body>
<div id="root"></div>
<noscript>
  <p style="text-align:center;padding:40px;color:#64748b">
    GeoFlow requires JavaScript to run the WebAssembly engine.
  </p>
</noscript>
<script type="module">
import React, { useState, useEffect, useCallback, useRef, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm@3';
import init, {
  validate_ags, fix_ags, convert_to_diggs, ags_info,
  list_locations, render_borehole_svg, diff_ags,
} from './pkg/geoflow_wasm.js';

const html = htm.bind(React.createElement);

// ── Utilities ────────────────────────────────────────────────────────────────
function formatBytes(n) {
  if (n < 1024)      return n + ' B';
  if (n < 1048576)   return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(1) + ' MB';
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: name });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function fixedName(n) { const d = n.lastIndexOf('.'); return d > 0 ? n.slice(0,d)+'_fixed'+n.slice(d) : n+'_fixed'; }
function digsName(n)  { const d = n.lastIndexOf('.'); return (d > 0 ? n.slice(0,d) : n) + '.diggs.xml'; }

// ── DropZone ─────────────────────────────────────────────────────────────────
function DropZone({ onFile, fileName, fileSize }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);
  return html`
    <div
      className=${`drop-zone${dragOver ? ' drag-over' : ''}`}
      onClick=${() => inputRef.current.click()}
      onDragOver=${e => { e.preventDefault(); setDragOver(true); }}
      onDragLeave=${() => setDragOver(false)}
      onDrop=${e => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]); }}
    >
      <input ref=${inputRef} type="file" accept=".ags,.xml,.diggs" style="display:none"
        onChange=${e => { if (e.target.files[0]) onFile(e.target.files[0]); }} />
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
      </svg>
      <p><strong>Drop an AGS file here</strong> or click to browse</p>
      <p>.ags &nbsp;·&nbsp; .xml (DIGGS) &nbsp;·&nbsp; .diggs</p>
      ${fileName && html`<div className="file-name">${fileName}${fileSize ? ` (${formatBytes(fileSize)})` : ''}</div>`}
    </div>
  `;
}

// ── DiagnosticsLog ────────────────────────────────────────────────────────────
function DiagnosticsLog({ diagnostics }) {
  const [filter, setFilter] = useState('all');
  const counts = useMemo(() => {
    const c = { error: 0, warning: 0, info: 0 };
    diagnostics.forEach(d => { if (d.severity in c) c[d.severity]++; });
    return c;
  }, [diagnostics]);
  const visible = useMemo(
    () => filter === 'all' ? diagnostics : diagnostics.filter(d => d.severity === filter),
    [diagnostics, filter]
  );

  if (diagnostics.length === 0) return html`
    <div className="diag-panel">
      <div className="diag-panel-head"><h2>Diagnostics</h2></div>
      <div className="empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" strokeWidth="2">
          <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
        </svg>
        <p>No issues found — file is valid.</p>
      </div>
    </div>
  `;

  const LABELS = { all: `ALL (${diagnostics.length})`, error: `ERR (${counts.error})`, warning: `WARN (${counts.warning})`, info: `INFO (${counts.info})` };
  return html`
    <div className="diag-panel">
      <div className="diag-panel-head">
        <h2>Diagnostics</h2>
        <div className="filter-pills">
          ${['all','error','warning','info'].map(f => html`
            <button key=${f} className=${`pill${filter===f?' active':''}`} onClick=${()=>setFilter(f)}>${LABELS[f]}</button>
          `)}
        </div>
      </div>
      <div className="diag-scroll">
        ${visible.map((d, i) => {
          const group = d.location?.group ?? '—';
          const line  = d.location?.line  != null ? `L${d.location.line}` : '—';
          const sev   = d.severity === 'error' ? 'ERR' : d.severity === 'warning' ? 'WARN' : 'INFO';
          return html`
            <div key=${i} className="log-row">
              <span className=${`log-sev sev-${d.severity}`}>${sev}</span>
              <span className="log-rule">${d.rule_id}</span>
              <span className="log-loc">${group} · ${line}</span>
              <span className="log-msg">${d.message}</span>
            </div>
          `;
        })}
      </div>
    </div>
  `;
}

// ── BoreholeMap ───────────────────────────────────────────────────────────────
function BoreholeMap({ locations, selectedId, onSelect }) {
  const mapped = locations.filter(l => l.easting != null && l.northing != null);
  const W = 328, H = 220, PAD = 28;

  let plot = null;
  if (mapped.length > 0) {
    const es = mapped.map(l => l.easting),  ns = mapped.map(l => l.northing);
    const minE = Math.min(...es), maxE = Math.max(...es);
    const minN = Math.min(...ns), maxN = Math.max(...ns);
    const rE = Math.max(maxE - minE, 1), rN = Math.max(maxN - minN, 1);
    const sx = e => PAD + ((e - minE) / rE) * (W - PAD * 2);
    const sy = n => H - PAD - ((n - minN) / rN) * (H - PAD * 2);

    plot = html`
      <div className="map-svg-wrap">
        <svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
          ${[0,.25,.5,.75,1].map(t => html`
            <line key=${'eg'+t} x1=${PAD+t*(W-PAD*2)} y1=${PAD} x2=${PAD+t*(W-PAD*2)} y2=${H-PAD} stroke="#e5e7eb" strokeWidth="0.5"/>
            <line key=${'ng'+t} x1=${PAD} y1=${PAD+t*(H-PAD*2)} x2=${W-PAD} y2=${PAD+t*(H-PAD*2)} stroke="#e5e7eb" strokeWidth="0.5"/>
          `)}
          <text x=${W/2} y=${H-6} fontSize="9" textAnchor="middle" fill="#9ca3af">Easting →</text>
          <text x="8" y=${H/2} fontSize="9" textAnchor="middle" fill="#9ca3af" transform=${`rotate(-90,8,${H/2})`}>↑ Northing</text>
          ${mapped.map(loc => html`
            <g key=${loc.id} style="cursor:pointer" onClick=${()=>onSelect(loc)}>
              <circle cx=${sx(loc.easting)} cy=${sy(loc.northing)} r="6"
                fill=${selectedId===loc.id?'var(--navy)':'#3b82f6'}
                stroke=${selectedId===loc.id?'#93c5fd':'#1d4ed8'} strokeWidth="1.5"/>
              <text x=${sx(loc.easting)} y=${sy(loc.northing)-9}
                fontSize="9" textAnchor="middle"
                fill=${selectedId===loc.id?'var(--navy)':'#374151'}
                fontWeight=${selectedId===loc.id?'700':'400'}
              >${loc.id}</text>
            </g>
          `)}
        </svg>
      </div>
    `;
  }

  return html`
    <div className="map-card">
      <div className="map-card-head">Borehole Locations (${locations.length})</div>
      <div className="map-card-body">
        ${plot ?? html`<p style="font-size:13px;color:var(--muted)">No coordinate data (LOCA_NATE / LOCA_NATN) in this file.</p>`}
        <div className="bh-grid">
          ${locations.map(loc => html`
            <button key=${loc.id}
              className=${`bh-btn${selectedId===loc.id?' active':''}`}
              title=${loc.depth!=null?`Final depth: ${loc.depth} m`:''}
              onClick=${()=>onSelect(loc)}
            >${loc.id}</button>
          `)}
        </div>
      </div>
    </div>
  `;
}

// ── BoreholeSvgPanel ──────────────────────────────────────────────────────────
function BoreholeSvgPanel({ loc, fileBytes, wasmReady, className }) {
  const [svg, setSvg] = useState('');
  useEffect(() => {
    if (!loc || !fileBytes || !wasmReady) return;
    setSvg('');
    setTimeout(() => { try { setSvg(render_borehole_svg(fileBytes, loc.id) || ''); } catch(_) {} }, 0);
  }, [loc?.id, fileBytes, wasmReady]);

  if (!svg) return null;
  return html`
    <div className=${className ?? 'bh-preview'}>
      <div className="bh-preview-meta">
        <strong>${loc.id}</strong>
        ${loc.easting  != null ? html`<span>E ${loc.easting}</span>` : null}
        ${loc.northing != null ? html`<span>N ${loc.northing}</span>` : null}
        ${loc.depth    != null ? html`<span>Depth ${loc.depth} m</span>` : null}
      </div>
      <div dangerouslySetInnerHTML=${{ __html: svg }}></div>
    </div>
  `;
}

// ── LogSheet ──────────────────────────────────────────────────────────────────
function LogSheet({ loc, fileBytes, wasmReady, fileInfo }) {
  const [svg, setSvg] = useState('');
  const [busy, setBusy] = useState(false);
  useEffect(() => {
    if (!loc || !fileBytes || !wasmReady) return;
    setBusy(true); setSvg('');
    setTimeout(() => {
      try { setSvg(render_borehole_svg(fileBytes, loc.id) || ''); } catch(_) {}
      setBusy(false);
    }, 0);
  }, [loc?.id, fileBytes, wasmReady]);

  if (!loc) return html`
    <div className="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style="color:var(--muted)">
        <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25"/>
        <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 19.5h16.5M3.75 15h16.5M3.75 10.5H9"/>
      </svg>
      <p>Select a borehole from the list to view its log.</p>
    </div>
  `;

  return html`
    <div className="log-sheet">
      <div className="log-sheet-hdr">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <h2>Borehole Log — ${loc.id}</h2>
        <span className="version">GeoFlow / AGS 4.x</span>
      </div>

      <div className="log-sheet-meta">
        <div className="meta-cell">
          <div className="lbl">Project</div>
          <div className="val">${fileInfo?.project || '—'}</div>
        </div>
        <div className="meta-cell">
          <div className="lbl">Borehole ID</div>
          <div className="val">${loc.id}</div>
        </div>
        <div className="meta-cell">
          <div className="lbl">Final Depth</div>
          <div className="val">${loc.depth != null ? `${loc.depth} m` : '—'}</div>
        </div>
        <div className="meta-cell">
          <div className="lbl">Easting (m E)</div>
          <div className="val">${loc.easting != null ? loc.easting.toFixed(1) : '—'}</div>
        </div>
        <div className="meta-cell">
          <div className="lbl">Northing (m N)</div>
          <div className="val">${loc.northing != null ? loc.northing.toFixed(1) : '—'}</div>
        </div>
        <div className="meta-cell">
          <div className="lbl">Ground Level (mOD)</div>
          <div className="val">—</div>
        </div>
      </div>

      <div className="log-sheet-col-hdr">
        <div className="log-col-lbl" style="width:60px">Depth (m)</div>
        <div className="log-col-lbl" style="width:80px">Lithology</div>
        <div className="log-col-lbl" style="width:20px"></div>
        <div className="log-col-lbl" style="width:100px">SPT N-value →</div>
        <div className="log-col-lbl" style="width:50px">Water</div>
      </div>

      <div className="log-sheet-body">
        ${busy ? html`<p style="padding:16px 0;font-size:13px;color:var(--muted)">Rendering…</p>` :
          svg  ? html`<div dangerouslySetInnerHTML=${{ __html: svg }}></div>` :
          html`<p style="padding:16px 0;font-size:13px;color:var(--muted)">No strip-log data available for this borehole.</p>`
        }
      </div>

      <div className="log-sheet-legend">
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-right:4px">Legend:</span>
        <div className="legend-item">
          <div className="legend-swatch" style="background:#d1d5db;border:1px solid #9ca3af"></div>
          <span>Geology layer</span>
        </div>
        <div className="legend-item">
          <div className="legend-swatch" style="background:#3b82f6;border:1px solid #1d4ed8"></div>
          <span>Sample</span>
        </div>
        <div className="legend-item">
          <div className="legend-swatch" style="background:#f97316;border:1px solid #c2410c"></div>
          <span>SPT N-value</span>
        </div>
        <div className="legend-item">
          <div className="legend-swatch" style="background:#06b6d4;border:1px solid #0891b2;transform:rotate(45deg)"></div>
          <span>Water strike</span>
        </div>
      </div>
    </div>
  `;
}

// ── UploadTab ─────────────────────────────────────────────────────────────────
function UploadTab({ fileBytes, fileName, fileSize, wasmReady, status, fileInfo, diagnostics, onFile, onValidate, onFix, onConvert }) {
  const counts = useMemo(() => {
    if (!diagnostics) return null;
    const c = { error: 0, warning: 0, info: 0 };
    diagnostics.forEach(d => { if (d.severity in c) c[d.severity]++; });
    return c;
  }, [diagnostics]);

  return html`
    <div>
      <${DropZone} onFile=${onFile} fileName=${fileName} fileSize=${fileSize} />
      <div className="actions">
        <button className="btn-primary"   disabled=${!fileBytes||!wasmReady} onClick=${onValidate}>Validate</button>
        <button className="btn-secondary" disabled=${!fileBytes||!wasmReady} onClick=${onFix}>Fix &amp; Download</button>
        <button className="btn-accent"    disabled=${!fileBytes||!wasmReady} onClick=${onConvert}>Convert to DIGGS</button>
      </div>
      <div className=${`status${status.type?' '+status.type:''}`}>${status.msg}</div>

      ${fileInfo && html`
        <div className="file-info-bar">
          <span><strong>${fileInfo.group_count}</strong> groups</span>
          <span><strong>${fileInfo.total_rows}</strong> rows</span>
          ${fileInfo.locations > 0 ? html`<span><strong>${fileInfo.locations}</strong> locations</span>` : null}
          ${fileInfo.ags_version ? html`<span>AGS <strong>${fileInfo.ags_version}</strong></span>` : null}
          ${fileInfo.project ? html`<span>"${fileInfo.project}"</span>` : null}
        </div>
      `}

      ${diagnostics !== null && html`
        <div className="summary">
          ${diagnostics.length === 0
            ? html`<span className="badge badge-ok">✓ No issues found</span>`
            : html`
              ${counts.error   ? html`<span className="badge badge-error">✕ ${counts.error} error${counts.error!==1?'s':''}</span>` : null}
              ${counts.warning ? html`<span className="badge badge-warning">⚠ ${counts.warning} warning${counts.warning!==1?'s':''}</span>` : null}
              ${counts.info    ? html`<span className="badge badge-info">ℹ ${counts.info} info</span>` : null}
            `
          }
        </div>
      `}
    </div>
  `;
}

// ── ValidationMapTab ──────────────────────────────────────────────────────────
function ValidationMapTab({ diagnostics, locations, fileBytes, wasmReady }) {
  const [selectedLoc, setSelectedLoc] = useState(null);

  if (!diagnostics && locations.length === 0) return html`
    <div className="empty">
      <p>Load and validate a file in the <strong>Upload &amp; Convert</strong> tab to see results here.</p>
    </div>
  `;

  return html`
    <div className="val-map-grid">
      <div>
        ${diagnostics !== null
          ? html`<${DiagnosticsLog} diagnostics=${diagnostics} />`
          : html`<div className="empty"><p>Run <strong>Validate</strong> in the Upload tab to populate this view.</p></div>`
        }
      </div>
      <div>
        ${locations.length > 0
          ? html`<${BoreholeMap} locations=${locations} selectedId=${selectedLoc?.id} onSelect=${setSelectedLoc} />`
          : html`<div className="empty" style="padding:24px"><p>No boreholes (LOCA group) in this file.</p></div>`
        }
        ${selectedLoc && html`<${BoreholeSvgPanel} loc=${selectedLoc} fileBytes=${fileBytes} wasmReady=${wasmReady} />`}
      </div>
    </div>
  `;
}

// ── LogTab ────────────────────────────────────────────────────────────────────
function LogTab({ locations, fileBytes, wasmReady, fileInfo }) {
  const [selectedLoc, setSelectedLoc] = useState(null);

  if (locations.length === 0) return html`
    <div className="empty">
      <p>Load an AGS file with borehole data (LOCA group) in the <strong>Upload &amp; Convert</strong> tab.</p>
    </div>
  `;

  return html`
    <div className="log-tab-grid">
      <div className="bh-list-panel">
        <div className="bh-list-head">Boreholes (${locations.length})</div>
        ${locations.map(loc => html`
          <div key=${loc.id}
            className=${`bh-list-item${selectedLoc?.id===loc.id?' active':''}`}
            onClick=${()=>setSelectedLoc(loc)}
          >
            <span>${loc.id}</span>
            ${loc.depth!=null ? html`<span className="depth">${loc.depth} m</span>` : null}
          </div>
        `)}
      </div>
      <div>
        <${LogSheet} loc=${selectedLoc} fileBytes=${fileBytes} wasmReady=${wasmReady} fileInfo=${fileInfo} />
      </div>
    </div>
  `;
}

// ── DiffTab ───────────────────────────────────────────────────────────────────
function DiffTab({ wasmReady }) {
  const [bytesA, setBytesA]   = useState(null);
  const [bytesB, setBytesB]   = useState(null);
  const [nameA, setNameA]     = useState('');
  const [nameB, setNameB]     = useState('');
  const [dragA, setDragA]     = useState(false);
  const [dragB, setDragB]     = useState(false);
  const [result, setResult]   = useState(null);
  const [status, setStatus]   = useState('');
  const refA = useRef(null), refB = useRef(null);

  function loadFile(file, side) {
    const r = new FileReader();
    r.onload = e => {
      const b = new Uint8Array(e.target.result);
      if (side === 'A') { setBytesA(b); setNameA(file.name); }
      else              { setBytesB(b); setNameB(file.name); }
    };
    r.readAsArrayBuffer(file);
  }

  function compare() {
    if (!bytesA || !bytesB || !wasmReady) return;
    setStatus('Comparing…'); setResult(null);
    setTimeout(() => {
      try { setResult(JSON.parse(diff_ags(bytesA, bytesB))); setStatus(''); }
      catch(e) { setStatus('Error: ' + e.message); }
    }, 0);
  }

  function zone(side, drag, setDrag, ref, name, bytes) {
    return html`
      <div>
        <div className="diff-zone-lbl">File ${side} ${side==='A'?'(before)':'(after)'}</div>
        <div className=${`diff-drop${drag?' drag-over':''}${bytes?' loaded':''}`}
          onClick=${()=>ref.current.click()}
          onDragOver=${e=>{e.preventDefault();setDrag(true);}}
          onDragLeave=${()=>setDrag(false)}
          onDrop=${e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0],side);}}
        >
          <input ref=${ref} type="file" accept=".ags" style="display:none"
            onChange=${e=>{if(e.target.files[0])loadFile(e.target.files[0],side);}} />
          <p>${name||`Drop or click — AGS file ${side}`}</p>
        </div>
      </div>
    `;
  }

  return html`
    <div>
      <div className="diff-zones">
        ${zone('A', dragA, setDragA, refA, nameA, bytesA)}
        ${zone('B', dragB, setDragB, refB, nameB, bytesB)}
      </div>
      <div className="actions">
        <button className="btn-primary" disabled=${!bytesA||!bytesB||!wasmReady} onClick=${compare}>Compare</button>
      </div>
      ${status && html`<div style="margin-top:10px;font-size:13px;color:var(--muted)">${status}</div>`}
      ${result && html`<${DiffResult} d=${result} />`}
    </div>
  `;
}

function DiffResult({ d }) {
  if (d.identical) return html`<div className="diff-identical" style="margin-top:20px">✓ Files are identical</div>`;
  return html`
    <div className="diff-result">
      ${d.only_in_a?.length ? html`
        <div className="diff-group-row">
          <div className="diff-group-hdr">Groups only in A</div>
          <div style="padding:10px 16px;font-size:12px">
            ${d.only_in_a.map(g => html`<span key=${g} className="diff-only diff-removed">− ${g}</span>`)}
          </div>
        </div>
      ` : null}
      ${d.only_in_b?.length ? html`
        <div className="diff-group-row">
          <div className="diff-group-hdr">Groups only in B</div>
          <div style="padding:10px 16px;font-size:12px">
            ${d.only_in_b.map(g => html`<span key=${g} className="diff-only diff-added">+ ${g}</span>`)}
          </div>
        </div>
      ` : null}
      ${(d.groups||[]).map(g => html`
        <div key=${g.group} className="diff-group-row">
          <div className="diff-group-hdr">
            <span>${g.group}</span>
            ${g.rows_unchanged ? html`<span className="diff-badge diff-unchanged">${g.rows_unchanged} unchanged</span>` : null}
            ${g.rows_added     ? html`<span className="diff-badge diff-added">+${g.rows_added} added</span>`           : null}
            ${g.rows_removed   ? html`<span className="diff-badge diff-removed">−${g.rows_removed} removed</span>`      : null}
            ${g.rows_modified  ? html`<span className="diff-badge diff-modified">~${g.rows_modified} modified</span>`   : null}
          </div>
        </div>
      `)}
    </div>
  `;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [wasmReady, setWasmReady]     = useState(false);
  const [fileBytes, setFileBytes]     = useState(null);
  const [fileName, setFileName]       = useState('');
  const [fileSize, setFileSize]       = useState(0);
  const [fileInfo, setFileInfo]       = useState(null);
  const [diagnostics, setDiagnostics] = useState(null);
  const [locations, setLocations]     = useState([]);
  const [status, setStatus]           = useState({ msg: 'Loading WebAssembly engine…', type: 'loading' });
  const [tab, setTab]                 = useState('upload');

  useEffect(() => {
    init()
      .then(() => { setWasmReady(true); setStatus({ msg: 'Engine ready. Drop or select an AGS file.', type: '' }); })
      .catch(e  => { setStatus({ msg: 'Failed to load WebAssembly engine: ' + e.message, type: 'error' }); });
  }, []);

  const handleFile = useCallback(file => {
    setFileName(file.name);
    setFileSize(file.size);
    setDiagnostics(null);
    setLocations([]);
    setFileInfo(null);
    const r = new FileReader();
    r.onload = e => {
      const bytes = new Uint8Array(e.target.result);
      setFileBytes(bytes);
      if (wasmReady) {
        try {
          const info = JSON.parse(ags_info(bytes));
          setFileInfo(info);
        } catch(_) {}
        try {
          setLocations(JSON.parse(list_locations(bytes)) || []);
        } catch(_) {}
      }
      setStatus({ msg: 'File loaded. Click Validate to check for issues.', type: '' });
    };
    r.readAsArrayBuffer(file);
  }, [wasmReady]);

  const handleValidate = useCallback(() => {
    if (!fileBytes || !wasmReady) return;
    setStatus({ msg: 'Validating…', type: 'loading' });
    setTimeout(() => {
      try {
        setDiagnostics(JSON.parse(validate_ags(fileBytes)));
        setStatus({ msg: '', type: '' });
      } catch(e) { setStatus({ msg: 'Validation error: ' + e.message, type: 'error' }); }
    }, 0);
  }, [fileBytes, wasmReady]);

  const handleFix = useCallback(() => {
    if (!fileBytes || !wasmReady) return;
    setStatus({ msg: 'Applying fixes…', type: 'loading' });
    setTimeout(() => {
      try {
        downloadBlob(new Blob([fix_ags(fileBytes)], { type: 'text/plain' }), fixedName(fileName));
        setStatus({ msg: 'Fixed file downloaded.', type: '' });
      } catch(e) { setStatus({ msg: 'Fix error: ' + e.message, type: 'error' }); }
    }, 0);
  }, [fileBytes, wasmReady, fileName]);

  const handleConvert = useCallback(() => {
    if (!fileBytes || !wasmReady) return;
    setStatus({ msg: 'Converting to DIGGS…', type: 'loading' });
    setTimeout(() => {
      try {
        const xml = convert_to_diggs(fileBytes);
        if (!xml) { setStatus({ msg: 'Conversion produced no output (unmapped groups?)', type: 'error' }); return; }
        downloadBlob(new Blob([xml], { type: 'application/xml' }), digsName(fileName));
        setStatus({ msg: 'DIGGS file downloaded.', type: '' });
      } catch(e) { setStatus({ msg: 'Conversion error: ' + e.message, type: 'error' }); }
    }, 0);
  }, [fileBytes, wasmReady, fileName]);

  const TABS = [
    { id: 'upload',     label: 'Upload & Convert' },
    { id: 'validation', label: 'Validation / Map'  },
    { id: 'logs',       label: 'Logs'              },
    { id: 'diff',       label: 'Diff'              },
  ];

  return html`
    <div>
      <header>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <h1>GeoFlow</h1>
        <span className="hdr-sub">AGS 4.x Validator &amp; Converter — runs entirely in your browser</span>
      </header>

      <main>
        <div className="tab-bar">
          ${TABS.map(t => html`
            <button key=${t.id} className=${`tab-btn${tab===t.id?' active':''}`} onClick=${()=>setTab(t.id)}>
              ${t.label}
            </button>
          `)}
        </div>

        ${tab === 'upload' && html`
          <${UploadTab}
            fileBytes=${fileBytes} fileName=${fileName} fileSize=${fileSize}
            wasmReady=${wasmReady} status=${status} fileInfo=${fileInfo}
            diagnostics=${diagnostics}
            onFile=${handleFile} onValidate=${handleValidate}
            onFix=${handleFix} onConvert=${handleConvert}
          />
        `}
        ${tab === 'validation' && html`
          <${ValidationMapTab}
            diagnostics=${diagnostics} locations=${locations}
            fileBytes=${fileBytes} wasmReady=${wasmReady}
          />
        `}
        ${tab === 'logs' && html`
          <${LogTab}
            locations=${locations} fileBytes=${fileBytes}
            wasmReady=${wasmReady} fileInfo=${fileInfo}
          />
        `}
        ${tab === 'diff' && html`<${DiffTab} wasmReady=${wasmReady} />`}
      </main>
    </div>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
