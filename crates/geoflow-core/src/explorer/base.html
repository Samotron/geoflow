<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GeoFlow Explorer{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy:   #0f2644;
            --blue:   #1a4080;
            --bg:     #f1f5f9;
            --card:   #ffffff;
            --border: #cbd5e1;
            --text:   #0f172a;
            --muted:  #64748b;
            --radius: 6px;
            --nav-w:  220px;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* ── Top bar ── */
        .top-bar {
            background: var(--navy);
            color: #fff;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .top-bar-logo {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .top-bar-sub {
            font-size: 11px;
            opacity: 0.45;
            margin-left: auto;
        }
        /* ── Layout ── */
        .layout { display: flex; flex: 1; overflow: hidden; }
        nav {
            width: var(--nav-w);
            background: var(--card);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px 0;
            flex-shrink: 0;
        }
        main { flex: 1; overflow-y: auto; padding: 24px 28px 60px; }
        /* ── Nav items ── */
        .nav-section {
            padding: 6px 14px 2px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            font-size: 13px;
            color: #334155;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: background .1s, color .1s;
        }
        .nav-item:hover { background: #f1f5f9; color: var(--text); }
        .nav-item.active { background: #eff6ff; color: var(--blue); border-left-color: var(--blue); font-weight: 600; }
        .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }
        /* ── Content ── */
        h1 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
        h2 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
        h3 { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
        /* ── Tables ── */
        table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 1; }
        th {
            background: #f8fafc;
            border-bottom: 2px solid var(--border);
            border-right: 1px solid #e2e8f0;
            padding: 8px 12px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
        }
        td {
            border-bottom: 1px solid #f1f5f9;
            border-right: 1px solid #f8fafc;
            padding: 7px 12px;
            font-size: 13px;
            font-family: monospace;
        }
        tr:hover td { background: #f8faff; }
        /* ── Severity ── */
        .severity-error   { color: #dc2626; font-weight: 700; }
        .severity-warning { color: #d97706; font-weight: 700; }
        .severity-info    { color: #2563eb; }
        /* ── Cards ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
        <span class="top-bar-logo">GeoFlow</span>
        <span class="top-bar-sub">AGS 4.x Explorer</span>
    </div>
    <div class="layout">
        <nav>
            <div class="nav-section">Overview</div>
            <a href="/index.html" class="nav-item {% if not group_name and not loca_id and page != 'validation' %}active{% endif %}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Summary
            </a>
            <a href="/validation.html" class="nav-item {% if page == 'validation' %}active{% endif %}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Validation
            </a>

            {% if file.groups.LOCA %}
                <div class="nav-divider"></div>
                <div class="nav-section">Boreholes</div>
                {% for r in file.groups.LOCA.rows %}
                    {% set id = r.LOCA_ID %}
                    <a href="/borehole/{{ id }}.html" class="nav-item {% if loca_id == id %}active{% endif %}">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="3"/></svg>
                        {{ id }}
                    </a>
                {% endfor %}
            {% endif %}

            <div class="nav-divider"></div>
            <div class="nav-section">Data Groups</div>
            {% for g in file.groups | sort %}
                <a href="/group/{{ g }}.html" class="nav-item {% if group_name == g %}active{% endif %}">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                    {{ g }}
                </a>
            {% endfor %}
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
