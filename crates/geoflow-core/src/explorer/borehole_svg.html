<svg width="310" height="820" viewBox="0 0 310 820" font-family="sans-serif" xmlns="http://www.w3.org/2000/svg">
    <!-- Column headers -->
    <text x="100" y="14" font-size="10" text-anchor="middle" font-weight="bold">Lithology</text>
    <text x="148" y="14" font-size="10" text-anchor="middle" font-weight="bold">Samp</text>
    <text x="210" y="14" font-size="10" text-anchor="middle" font-weight="bold">SPT N</text>
    <text x="275" y="14" font-size="10" text-anchor="middle" font-weight="bold">Water</text>

    <!-- SPT N scale -->
    {% for tick in [0, 25, 50, 75, 100] %}
        <line x1="{{ 160 + tick }}" y1="16" x2="{{ 160 + tick }}" y2="800" stroke="#e5e7eb" stroke-width="0.5"/>
        <text x="{{ 160 + tick }}" y="26" font-size="8" text-anchor="middle" fill="#9ca3af">{{ tick }}</text>
    {% endfor %}

    <!-- Depth axis -->
    <line x1="50" y1="30" x2="50" y2="800" stroke="#374151" stroke-width="1"/>
    {% for i in range(0, 51, 5) %}
        <text x="44" y="{{ 30 + i * 15 }}" font-size="9" text-anchor="end" fill="#374151">{{ i }}</text>
        <line x1="46" y1="{{ 30 + i * 15 }}" x2="54" y2="{{ 30 + i * 15 }}" stroke="#374151" stroke-width="0.8"/>
    {% endfor %}
    {% for i in range(0, 51) %}
        <line x1="48" y1="{{ 30 + i * 15 }}" x2="52" y2="{{ 30 + i * 15 }}" stroke="#9ca3af" stroke-width="0.4"/>
    {% endfor %}

    <!-- Lithology strip outline -->
    <rect x="60" y="30" width="80" height="770" fill="#f9fafb" stroke="#374151" stroke-width="0.8"/>

    <!-- GEOL layers -->
    {% for layer in geol %}
        {% set top = layer.GEOL_TOP | float %}
        {% set base = layer.GEOL_BASE | float %}
        {% set y_top = 30 + top * 15 %}
        {% set h = (base - top) * 15 %}
        <rect x="61" y="{{ y_top }}" width="78" height="{{ h }}"
              fill="#d1d5db" stroke="#9ca3af" stroke-width="0.5" opacity="0.85">
            <title>{{ layer.GEOL_DESC }} ({{ top }}–{{ base }} m)</title>
        </rect>
        {% if h > 14 %}
            <text x="100" y="{{ y_top + 10 }}" font-size="9" text-anchor="middle"
                  fill="#1f2937" style="pointer-events:none">{{ layer.GEOL_DESC | truncate(16) }}</text>
        {% endif %}
        <line x1="60" y1="{{ 30 + base * 15 }}" x2="140" y2="{{ 30 + base * 15 }}"
              stroke="#6b7280" stroke-width="0.6" stroke-dasharray="2,2"/>
    {% endfor %}

    <!-- SAMP markers -->
    {% for s in samp %}
        {% set depth = s.SAMP_TOP | default(value="0") | float %}
        <rect x="142" y="{{ 30 + depth * 15 - 4 }}" width="11" height="8"
              fill="#3b82f6" stroke="#1d4ed8" stroke-width="0.5" rx="1">
            <title>Sample {{ s.SAMP_REF }} ({{ s.SAMP_TYPE }}) at {{ depth }} m</title>
        </rect>
    {% endfor %}

    <!-- ISPT SPT N bars -->
    {% for test in ispt %}
        {% set depth = test.ISPT_TOP | float %}
        {% set nval = test.ISPT_NVAL | default(value="0") | float %}
        {% set bar_w = [nval, 100] | min %}
        {% set y_bar = 30 + depth * 15 - 4 %}
        <rect x="160" y="{{ y_bar }}" width="{{ bar_w }}" height="7"
              fill="#f97316" stroke="#c2410c" stroke-width="0.5" rx="1">
            <title>SPT N={{ nval | int }} at {{ depth }} m</title>
        </rect>
        <text x="{{ 163 + bar_w }}" y="{{ y_bar + 6 }}" font-size="8" fill="#374151">{{ nval | int }}</text>
    {% endfor %}

    <!-- WSTK water strike markers -->
    {% for ws in wstk %}
        {% set depth = ws.WSTK_DPTH | float %}
        {% set cy = 30 + depth * 15 %}
        <polygon points="{{ 275 }},{{ cy - 6 }} {{ 281 }},{{ cy }} {{ 275 }},{{ cy + 6 }} {{ 269 }},{{ cy }}"
                 fill="#06b6d4" stroke="#0891b2" stroke-width="0.5">
            <title>Water strike at {{ depth }} m</title>
        </polygon>
    {% endfor %}
</svg>
