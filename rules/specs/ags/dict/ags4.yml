    key_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]
    parent_group: SAMP
    heading_order: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]

  LDEN:
    required_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]
    depth_headings: [SPEC_DPTH, SAMP_TOP]
    key_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]
    parent_group: SAMP
    heading_order: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]

  LPDN:
    required_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]
    depth_headings: [SPEC_DPTH, SAMP_TOP]
    key_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]
    parent_group: SAMP
    heading_order: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]

  LPEN:
    required_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SPEC_DPTH]
