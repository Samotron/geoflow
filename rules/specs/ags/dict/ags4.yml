# AGS 4.x standard heading dictionary.
# Source: AGS4 Data Format, editions 4.0.3 / 4.0.4 / 4.1 / 4.1.1 / 4.2
#
# required_headings: headings that MUST be present when the group exists.
# depth_headings:    headings that represent depth and must carry unit "m".
# key_headings:      composite key columns for uniqueness checks (Rule 10a).
# parent_group:      immediate parent group for referential integrity (Rule 10c).
# heading_order:     reference order of required headings per the AGS standard (Rule 7.2).

groups:
  PROJ:
    required_headings: [PROJ_ID]
    depth_headings: []
    key_headings: [PROJ_ID]
    heading_order: [PROJ_ID]

  TRAN:
    required_headings: [TRAN_AGS]
    depth_headings: []
    key_headings: [TRAN_AGS]
    heading_order: [TRAN_AGS]

  ABBR:
    required_headings: [ABBR_HDNG, ABBR_CODE, ABBR_DESC]
    depth_headings: []
    key_headings: [ABBR_HDNG, ABBR_CODE]
    heading_order: [ABBR_HDNG, ABBR_CODE, ABBR_DESC]

  TYPE:
    required_headings: [TYPE_STAT]
    depth_headings: []
    key_headings: [TYPE_STAT]
    heading_order: [TYPE_STAT]

  UNIT:
    required_headings: [UNIT_ABBR, UNIT_DESC]
    depth_headings: []
    key_headings: [UNIT_ABBR]
    heading_order: [UNIT_ABBR, UNIT_DESC]

  LOCA:
    required_headings: [LOCA_ID, LOCA_TYPE]
    depth_headings: [LOCA_FDEP, LOCA_GL, LOCA_ELEV]
    key_headings: [LOCA_ID]
    heading_order: [LOCA_ID, LOCA_TYPE]

  GEOL:
    required_headings: [LOCA_ID, GEOL_TOP, GEOL_BASE, GEOL_DESC]
    depth_headings: [GEOL_TOP, GEOL_BASE]
    key_headings: [LOCA_ID, GEOL_TOP]
    parent_group: LOCA
    heading_order: [LOCA_ID, GEOL_TOP, GEOL_BASE, GEOL_DESC]

  SAMP:
    required_headings: [LOCA_ID, SAMP_TOP, SAMP_REF, SAMP_TYPE]
    depth_headings: [SAMP_TOP, SAMP_BASE]
    key_headings: [LOCA_ID, SAMP_TOP, SAMP_REF]
    parent_group: LOCA
    heading_order: [LOCA_ID, SAMP_TOP, SAMP_REF, SAMP_TYPE]

  ISPT:
    required_headings: [LOCA_ID, ISPT_TOP, ISPT_TESN, ISPT_NVAL]
    depth_headings: [ISPT_TOP, ISPT_DPTH]
    key_headings: [LOCA_ID, ISPT_TOP, ISPT_TESN]
    parent_group: SAMP
    heading_order: [LOCA_ID, ISPT_TOP, ISPT_TESN, ISPT_NVAL]

  WSTK:
    required_headings: [LOCA_ID, WSTK_DPTH]
    depth_headings: [WSTK_DPTH]
    key_headings: [LOCA_ID, WSTK_DPTH]
    parent_group: LOCA
