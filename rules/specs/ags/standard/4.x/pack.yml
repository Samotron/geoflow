version: 1
name: ags-standard
pack_version: "4.x"

# AGS 4.x standard validation rules.
#
# Each rule has:
#   id, severity, optional `in:` (group filter), and a declarative `check:`.
# When the declarative kinds aren't enough, drop down to `expr:`/`when:` for
# arbitrary JEXL.
#
# Reference: ags:standard@4.x

codelists:
  tran_ags_versions:
    inline: ["4.0.3", "4.0.4", "4.1", "4.1.1", "4.2"]

rules:
  # ── Structural ──────────────────────────────────────────────────────────────

  - id: AGS-STRUCT-001
    description: "AGS files must contain exactly one PROJ group with one row."
    severity: error
    check:
      group_size: { group: PROJ, equals: 1 }
    message: "PROJ group missing or does not have exactly one DATA row (found {actual})"

  - id: AGS-STRUCT-002
    description: "AGS 4 files must contain a TRAN group with a TRAN_AGS heading."
    severity: error
    check:
      heading_present: { group: TRAN, heading: TRAN_AGS }

  - id: AGS-STRUCT-003
    description: "Every LOCA row must have a non-empty LOCA_ID."
    severity: error
    in: LOCA
    check:
      required: [LOCA_ID]

  # ── Heading / unit / type consistency ───────────────────────────────────────

  - id: AGS-HEAD-001
    description: "Every group must declare a HEADING row."
    severity: error
    scope: file
    expr: "all_groups_have_headings()"
    message: "one or more groups are missing a HEADING row"

  - id: AGS-HEAD-002
    description: "Numeric headings should declare a unit."
    severity: warning
    scope: file
    expr: "all_numeric_headings_have_unit()"
    message: "one or more numeric headings have no unit declared"

  - id: AGS-HEAD-003
    description: "Every heading must have a declared TYPE."
    severity: error
    scope: file
    expr: "all_headings_have_type()"
    message: "one or more headings are missing a TYPE declaration"

  - id: AGS-TYPE-001
    description: "TYPE codes must be one of the AGS 4.x defined codes."
    severity: warning
    scope: file
    expr: "all_headings_have_valid_type()"
    message: "one or more headings carry an unrecognised TYPE code"

  # ── Value / range ────────────────────────────────────────────────────────────

  - id: AGS-VAL-001
    description: "GEOL_BASE must be greater than GEOL_TOP for every layer."
    severity: error
    in: GEOL
    check:
      compare: { left: GEOL_BASE, op: ">", right: GEOL_TOP }
    message: "GEOL row has GEOL_BASE ({row.GEOL_BASE}) not greater than GEOL_TOP ({row.GEOL_TOP})"

  - id: AGS-VAL-002
    description: "GEOL layers within each borehole must be in ascending depth order."
    severity: error
    in: GEOL
    check:
      monotonic: { field: GEOL_TOP, partition_by: LOCA_ID }

  # ── Cross-references ─────────────────────────────────────────────────────────

  - id: AGS-REF-001
    description: "Every SAMP row must reference an existing LOCA_ID."
    severity: error
    in: SAMP
    check:
      foreign_key:
        fields: [LOCA_ID]
        references: LOCA

  - id: AGS-REF-002
    description: "Every GEOL row must reference an existing LOCA_ID."
    severity: error
    in: GEOL
    check:
      foreign_key:
        fields: [LOCA_ID]
        references: LOCA

  # ── Uniqueness ───────────────────────────────────────────────────────────────

  - id: AGS-KEY-001
    description: "LOCA_ID must be unique across the LOCA group."
    severity: error
    in: LOCA
    check:
      unique: [LOCA_ID]

  - id: AGS-KEY-002
    description: "GEOL rows are uniquely identified by (LOCA_ID, GEOL_TOP)."
    severity: error
    in: GEOL
    check:
      unique: [LOCA_ID, GEOL_TOP]

  - id: AGS-KEY-003
    description: "SAMP rows are uniquely identified by (LOCA_ID, SAMP_TOP, SAMP_REF)."
    severity: error
    in: SAMP
    check:
      unique: [LOCA_ID, SAMP_TOP, SAMP_REF]

  # ── Version ──────────────────────────────────────────────────────────────────

  - id: AGS-STRUCT-004
    description: "TRAN_AGS must be a recognised AGS 4.x version."
    severity: warning
    in: TRAN
    check:
      one_of: { field: TRAN_AGS, codelist: tran_ags_versions }
    message: "TRAN_AGS value '{value}' is not a recognised AGS 4 version"

  # ── Formatting ───────────────────────────────────────────────────────────────

  - id: AGS-FMT-001
    description: "Text values must not have trailing whitespace."
    severity: warning
    expr: "!has_trailing_whitespace(row)"
    message: "row in {group} contains a value with trailing whitespace"
